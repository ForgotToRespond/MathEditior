<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
<title>LaTeX Editor | 高级公式编辑与函数绘图 (交点+清晰刻度)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root {
  --bg-base:        #1C1C1E;
  --bg-card:        #2C2C2E;
  --bg-toolbar:     #232325;
  --bg-statusbar:   #18181A;
  --border:         rgba(255,255,255,0.08);
  --border-focus:   rgba(255,255,255,0.22);
  --accent:         #0A84FF;
  --accent-hover:   #1A90FF;
  --accent-dim:     rgba(10,132,255,0.18);
  --text-primary:   rgba(255,255,255,0.90);
  --text-secondary: rgba(255,255,255,0.48);
  --text-muted:     rgba(255,255,255,0.26);
  --btn-bg:         rgba(255,255,255,0.07);
  --btn-hover:      rgba(255,255,255,0.12);
  --btn-active:     rgba(255,255,255,0.05);
  --danger:         #FF453A;
  --success:        #32D74B;
  --radius:         14px;
  --radius-sm:      9px;
  --radius-xs:      6px;
  --font-ui:        "Noto Sans SC", -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  --font-editor:    "JetBrains Mono", "Noto Sans SC", "PingFang SC", "Fira Code", "Cascadia Code", "Consolas", monospace;
  --font-preview:   "Noto Serif SC", "Source Han Serif SC", "PingFang SC", "Microsoft YaHei", Georgia, serif;
  --shadow-card:    0 2px 20px rgba(0,0,0,0.50), 0 0 0 0.5px rgba(255,255,255,0.07);
  --shadow-btn:     0 1px 4px rgba(0,0,0,0.4);
  --transition:     0.2s cubic-bezier(0.4,0,0.2,1);
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left:   env(safe-area-inset-left, 0px);
  --safe-right:  env(safe-area-inset-right, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; overscroll-behavior: none; }
body {
  height: 100%;
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  min-width: 320px;
  padding-top: var(--safe-top);
  padding-left: var(--safe-left);
  padding-right: var(--safe-right);
}

#toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 16px;
  background: var(--bg-toolbar);
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
#toolbar::-webkit-scrollbar { display: none; }
.toolbar-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.04em;
  margin-right: 4px;
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}
.toolbar-divider { width: 0.5px; height: 20px; background: var(--border); margin: 0 2px; flex-shrink: 0; }
.toolbar-spacer { flex: 1; min-width: 6px; }
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 6px 12px;
  min-height: 32px;
  background: var(--btn-bg);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background var(--transition), transform var(--transition);
  user-select: none;
  white-space: nowrap;
  box-shadow: var(--shadow-btn);
  outline: none;
  flex-shrink: 0;
}
.btn:hover   { background: var(--btn-hover); border-color: var(--border-focus); transform: scale(0.98); }
.btn:active  { background: var(--btn-active); transform: scale(0.96); }
.btn.accent  { background: var(--accent); border-color: transparent; color: #fff; }
.btn.accent:hover  { background: var(--accent-hover); box-shadow: 0 0 0 3px var(--accent-dim); }
.btn.plot-btn { background: rgba(50,215,75,0.12); border-color: rgba(50,215,75,0.25); color: #32D74B; }
.btn.plot-btn:hover { background: rgba(50,215,75,0.2); border-color: rgba(50,215,75,0.4); }
.shortcut-badge {
  display: inline-flex; align-items: center; gap: 2px;
  padding: 1px 5px;
  background: rgba(255,255,255,0.06);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 4px;
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
}

#main { display: flex; flex: 1; overflow: hidden; min-height: 0; }
#editor-pane {
  display: flex; flex-direction: column;
  width: 50%; min-width: 360px;
  border-right: 0.5px solid var(--border);
  background: var(--bg-base);
  flex-shrink: 0; min-height: 0;
}
.pane-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 14px;
  background: var(--bg-toolbar);
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0; gap: 8px; flex-wrap: wrap;
}
.pane-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-secondary); white-space: nowrap;
}
.pane-header-actions { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.pane-header-actions .btn { padding: 4px 10px; font-size: 12px; min-height: 28px; }

#editor-textarea {
  flex: 1; width: 100%;
  background: var(--bg-card);
  color: var(--text-primary);
  border: none; resize: none;
  font-family: var(--font-editor);
  font-size: 15px;
  line-height: 1.8;
  letter-spacing: 0.35px;
  padding: 22px 24px;
  outline: none;
  tab-size: 2;
  caret-color: var(--accent);
  min-height: 0; overflow-y: auto;
}
#editor-textarea::selection { background: rgba(10,132,255,0.28); }
.editor-hint {
  font-size: 11px; color: var(--text-muted); padding: 6px 14px;
  background: var(--bg-toolbar); border-top: 0.5px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-shrink: 0; overflow-x: auto;
}
.hint-item { display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
kbd {
  display: inline-flex; align-items: center;
  padding: 1px 5px; background: rgba(255,255,255,0.07);
  border: 0.5px solid rgba(255,255,255,0.12); border-radius: 4px;
  font-size: 10.5px; font-family: var(--font-editor); color: var(--text-secondary);
}

#resizer { width: 4px; background: transparent; cursor: col-resize; flex-shrink: 0; z-index: 5; transition: background 0.2s; }
#resizer:hover { background: rgba(10,132,255,0.4); }
#resizer.dragging { background: var(--accent); }

#preview-pane { display: flex; flex-direction: column; flex: 1; background: var(--bg-base); overflow: hidden; min-height: 0; }
#preview-scroll { flex: 1; overflow-y: auto; padding: 16px; }
#preview-scroll::-webkit-scrollbar { width: 6px; }
#preview-scroll::-webkit-scrollbar-track { background: transparent; }
#preview-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
#preview-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; gap: 14px; opacity: 0.4; pointer-events: none; padding: 40px; text-align: center;
}
#preview-empty p { font-size: 13px; color: var(--text-secondary); max-width: 220px; line-height: 1.6; }

.document-container {
  background: var(--bg-card); border-radius: var(--radius);
  box-shadow: var(--shadow-card); padding: 28px 32px;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.document-text {
  margin: 0.75em 0; line-height: 1.85; white-space: pre-wrap;
  color: var(--text-primary);
  font-family: var(--font-preview);
  font-size: 16px;
  letter-spacing: 0.3px;
}
.document-text h1 { font-family: var(--font-ui); font-size: 1.8em; font-weight: 600; margin: 0.67em 0; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
.document-text h2 { font-family: var(--font-ui); font-size: 1.5em; font-weight: 600; margin: 0.75em 0; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
.document-text h3 { font-family: var(--font-ui); font-size: 1.25em; font-weight: 600; margin: 0.83em 0; }
.document-text code { font-family: var(--font-editor); background: rgba(255,255,255,0.07); padding: 2px 6px; border-radius: 4px; font-size: 0.88em; }
.document-text .inline-formula { display: inline; margin: 0 0.1em; }
.document-formula { margin: 1.2em 0; text-align: center; overflow-x: auto; padding: 0.25em 0; }
.document-formula .katex-display { margin: 0; }
.katex { color: rgba(255,255,255,0.92) !important; font-size: 1.05em; }
.formula-error { color: var(--danger); font-size: 12px; font-family: var(--font-editor); padding: 8px 12px; background: rgba(255,69,58,0.1); border-radius: var(--radius-xs); border-left: 2px solid var(--danger); display: inline-block; }

.plot-output-block {
  margin-top: 16px;
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  overflow: hidden;
  border: 0.5px solid rgba(255,255,255,0.08);
}
.plot-output-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  background: var(--bg-toolbar);
  border-bottom: 0.5px solid var(--border);
}
.plot-output-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.06em; }
.plot-output-meta { font-size: 11px; color: var(--text-muted); }
.plot-canvas-wrapper { padding: 12px; display: flex; justify-content: center; background: #101012; border-radius: 8px; }
.plot-canvas-wrapper canvas { border-radius: 8px; max-width: 100%; display: block; box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
.plot-legend {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 10px 14px 14px;
}
.legend-item {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-secondary);
  font-family: var(--font-editor);
}
.legend-dot {
  width: 10px; height: 10px; border-radius: 50%;
  flex-shrink: 0;
}
.intersections-list {
  margin-top: 12px;
  border-top: 0.5px solid rgba(255,255,255,0.08);
  padding: 10px 14px 12px;
  font-size: 11px;
  font-family: var(--font-editor);
  background: rgba(0,0,0,0.2);
}
.intersections-title {
  font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; letter-spacing: 0.5px;
}
.intersection-item {
  color: #FFD966; font-family: monospace; font-size: 11px; margin-bottom: 3px;
}

#statusbar {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 16px; padding-bottom: calc(6px + var(--safe-bottom));
  background: var(--bg-statusbar);
  border-top: 0.5px solid var(--border);
  flex-shrink: 0; font-size: 11.5px; color: var(--text-secondary);
  font-family: var(--font-editor);
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); flex-shrink: 0; transition: background 0.3s; }
.status-dot.error   { background: var(--danger); }
.status-dot.working { background: #FF9F0A; animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.35 } }
#status-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

#toast {
  position: fixed; bottom: calc(52px + var(--safe-bottom)); left: 50%;
  transform: translateX(-50%) translateY(10px);
  padding: 9px 18px; background: rgba(44,44,46,0.96);
  border: 0.5px solid rgba(255,255,255,0.12); border-radius: 20px;
  font-size: 13px; color: var(--text-primary); font-family: var(--font-ui);
  backdrop-filter: blur(14px); box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s;
  z-index: 1000; white-space: nowrap; max-width: calc(100vw - 40px); text-align: center;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Plot Modal */
#plot-modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px) saturate(160%);
  -webkit-backdrop-filter: blur(6px) saturate(160%);
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
}
#plot-modal-overlay.visible { opacity: 1; pointer-events: all; }
#plot-modal {
  background: rgba(38,38,40,0.97);
  border: 0.5px solid rgba(255,255,255,0.14);
  border-radius: 20px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 2px 12px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(255,255,255,0.06);
  width: 100%; max-width: 420px;
  overflow: hidden;
  transform: scale(0.88) translateY(16px);
  opacity: 0;
  transition: transform 0.38s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s ease;
  backdrop-filter: blur(40px) saturate(180%);
}
#plot-modal-overlay.visible #plot-modal { transform: scale(1) translateY(0); opacity: 1; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 14px; }
.modal-title { font-size: 17px; font-weight: 600; font-family: var(--font-ui); color: var(--text-primary); letter-spacing: -0.01em; }
.modal-close-btn { width: 28px; height: 28px; background: rgba(255,255,255,0.1); border: none; border-radius: 50%; color: var(--text-secondary); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
.modal-close-btn:hover { background: rgba(255,255,255,0.18); }
.modal-divider { height: 0.5px; background: var(--border); margin: 0; }
.modal-section { padding: 14px 20px; }
.modal-section + .modal-section { border-top: 0.5px solid var(--border); padding-top: 12px; }
.modal-section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 10px; }
#plot-functions-list { display: flex; flex-direction: column; gap: 7px; }
.fn-chip { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.09); border-radius: 10px; font-family: var(--font-editor); font-size: 13px; color: var(--text-primary); }
.fn-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.fn-expr { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fn-error { color: var(--danger); font-size: 11px; }
.modal-range-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.range-group label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
.range-group input[type=number] { width: 100%; padding: 8px 11px; background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.12); border-radius: 9px; color: var(--text-primary); font-family: var(--font-editor); font-size: 14px; outline: none; }
.range-group input[type=number]:focus { border-color: var(--accent); background: rgba(10,132,255,0.08); }
.segmented-control { display: flex; background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 3px; gap: 2px; width: 100%; }
.segmented-control input[type=radio] { display: none; }
.segmented-control label { flex: 1; text-align: center; padding: 7px 10px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; font-family: var(--font-ui); }
.segmented-control input[type=radio]:checked + label { background: rgba(255,255,255,0.14); color: var(--text-primary); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
.modal-footer { display: flex; gap: 10px; padding: 14px 20px; padding-bottom: calc(14px + var(--safe-bottom)); border-top: 0.5px solid var(--border); }
.modal-btn-cancel, .modal-btn-confirm { flex: 1; padding: 12px; border-radius: 12px; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.modal-btn-cancel { background: rgba(255,255,255,0.07); border: 0.5px solid rgba(255,255,255,0.1); color: var(--text-secondary); }
.modal-btn-confirm { flex: 2; background: var(--accent); border: none; color: #fff; font-weight: 600; }
.modal-btn-confirm:hover { background: var(--accent-hover); box-shadow: 0 0 0 4px var(--accent-dim); }

@media (max-width: 767px) {
  #plot-modal-overlay { align-items: flex-end; }
  #plot-modal { max-width: 100%; border-radius: 20px 20px 0 0; transform: translateY(100%); }
  #plot-modal-overlay.visible #plot-modal { transform: translateY(0); }
  .modal-drag-indicator { width: 36px; height: 4px; background: rgba(255,255,255,0.2); margin: 10px auto 0; border-radius: 2px; }
  #main { flex-direction: column; }
  #editor-pane { width: 100% !important; min-width: unset; height: 40dvh; border-right: none; border-bottom: 0.5px solid var(--border); }
  #preview-pane { height: 60dvh; flex: none; }
  #resizer { display: none; }
  .document-container { padding: 16px 20px; }
}
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <div class="toolbar-title">LaTeX Editor</div>
    <div class="toolbar-divider"></div>
    <button class="btn" id="btn-new">新建</button>
    <button class="btn" id="btn-open">打开</button>
    <input type="file" id="file-input" accept=".tex,.txt,.md" style="display:none" />
    <button class="btn" id="btn-save">保存</button>
    <div class="toolbar-divider"></div>
    <button class="btn accent" id="btn-export-pdf">导出 PDF</button>
    <button class="btn" id="btn-export-preview">导出图片</button>
    <div class="toolbar-divider"></div>
    <button class="btn plot-btn" id="btn-plot">绘图</button>
    <div class="toolbar-spacer"></div>
    <div class="shortcut-badge">Ctrl+K 转换 · Ctrl+P 绘图</div>
  </div>

  <div id="main">
    <div id="editor-pane">
      <div class="pane-header">
        <span class="pane-label">编辑器</span>
        <div class="pane-header-actions">
          <button class="btn" id="btn-smart-convert">智能转换 (Ctrl+K)</button>
          <button class="btn plot-btn" id="btn-plot-pane">绘图 (Ctrl+P)</button>
        </div>
      </div>
      <textarea id="editor-textarea" spellcheck="false" placeholder="输入文本，行内公式用 $...$，独立公式用 $$...$$&#10;&#10;绘图示例（选中后按 Ctrl+P）：&#10;y = x^2&#10;y = sin(x)&#10;y = 1/x"></textarea>
      <div class="editor-hint">
        <span class="hint-item"><kbd>$...$</kbd> 行内</span>
        <span class="hint-item"><kbd>$$...$$</kbd> 独立</span>
        <span class="hint-item"><kbd>Ctrl+K</kbd> 转换</span>
        <span class="hint-item"><kbd>Ctrl+P</kbd> 绘图</span>
        <span class="hint-item">选中 y=f(x) 后绘图</span>
      </div>
    </div>
    <div id="resizer"></div>
    <div id="preview-pane">
      <div class="pane-header">
        <span class="pane-label">预览</span>
        <span id="status-element-count" style="font-size:11px;color:var(--text-muted);">0 个元素</span>
      </div>
      <div id="preview-scroll">
        <div id="preview-empty"><p>输入文本和公式后将在此实时渲染<br>选中 y=f(x) 按 Ctrl+P 绘图</p></div>
      </div>
    </div>
  </div>
  <div id="statusbar"><div class="status-dot" id="status-dot"></div><span id="status-text">就绪</span></div>
</div>

<div id="plot-modal-overlay">
  <div id="plot-modal">
    <div class="modal-drag-indicator"></div>
    <div class="modal-header"><span class="modal-title">绘制函数图像</span><button class="modal-close-btn" id="plot-modal-close">✕</button></div>
    <div class="modal-divider"></div>
    <div class="modal-section"><div class="modal-section-label">检测到的函数</div><div id="plot-functions-list"></div></div>
    <div class="modal-section"><div class="modal-section-label">X 轴范围</div><div class="modal-range-grid"><div class="range-group"><label>最小值</label><input type="number" id="plot-xmin" value="-10"></div><div class="range-group"><label>最大值</label><input type="number" id="plot-xmax" value="10"></div></div></div>
    <div class="modal-section"><div class="modal-section-label">Y 轴范围</div><div class="modal-range-grid"><div class="range-group"><label>最小值</label><input type="number" id="plot-ymin" value="-10"></div><div class="range-group"><label>最大值</label><input type="number" id="plot-ymax" value="10"></div></div></div>
    <div class="modal-section"><div class="modal-section-label">图像尺寸</div><div class="segmented-control"><input type="radio" name="plot-size" id="size-sm" value="400"><label for="size-sm">小 (400)</label><input type="radio" name="plot-size" id="size-md" value="600" checked><label for="size-md">中 (600)</label><input type="radio" name="plot-size" id="size-lg" value="800"><label for="size-lg">大 (800)</label></div></div>
    <div class="modal-footer"><button class="modal-btn-cancel" id="plot-modal-cancel">取消</button><button class="modal-btn-confirm" id="plot-modal-confirm">绘制图像</button></div>
  </div>
</div>
<div id="toast"></div>

<script>
'use strict';
function waitForKatex(cb, tries=0) { if (typeof katex !== 'undefined') { cb(); return; } if (tries>50) { cb(); return; } setTimeout(()=>waitForKatex(cb, tries+1),100); }
waitForKatex(init);

function init() {
  const textarea = document.getElementById('editor-textarea');
  const previewScroll = document.getElementById('preview-scroll');
  const previewEmpty = document.getElementById('preview-empty');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const elementCountEl = document.getElementById('status-element-count');
  const toast = document.getElementById('toast');
  let toastTimer = null, currentDocumentContainer = null;

  const setStatus = (msg, type) => { statusText.textContent = msg; statusDot.className = 'status-dot' + (type && type !== 'ok' ? ' ' + type : ''); };
  const showToast = (msg, dur=2400) => { toast.textContent = msg; toast.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(()=>toast.classList.remove('show'), dur); };
  const debounce = (fn, delay) => { let t; return (...args)=>{ clearTimeout(t); t=setTimeout(()=>fn(...args), delay); }; };

  function renderMarkdownBasic(text) { return text.replace(/[&<>]/g, m=> m==='&'?'&amp;': m==='<'?'&lt;':'&gt;').replace(/^### (.*$)/gm,'<h3>$1</h3>').replace(/^## (.*$)/gm,'<h2>$1</h2>').replace(/^# (.*$)/gm,'<h1>$1</h1>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/__(.+?)__/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/_(.+?)_/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>').replace(/\n/g,'<br>'); }
  function renderTextWithInlineFormula(text) { let re = /\$([^\$]+?)\$/g, last=0, result='', m; while((m=re.exec(text))!==null){ result+=renderMarkdownBasic(text.substring(last,m.index)); let f=m[1].trim(); try{ result+='<span class="inline-formula">'+katex.renderToString(f,{throwOnError:false,errorColor:'#FF453A',displayMode:false})+'</span>'; }catch(e){ result+='<span class="formula-error">❌ '+e.message+'</span>'; } last=m.index+m[0].length; } result+=renderMarkdownBasic(text.substring(last)); return result; }
  function parseContent(source) { let blocks=[], re=/\$\$([\s\S]+?)\$\$/g, last=0, m; while((m=re.exec(source))!==null){ if(m.index>last) blocks.push({type:'text',content:source.substring(last,m.index)}); blocks.push({type:'displayFormula',content:m[1].trim()}); last=m.index+m[0].length; } if(last<source.length) blocks.push({type:'text',content:source.substring(last)}); return blocks; }
  const refreshPreview = debounce(()=>{ let blocks=parseContent(textarea.value); [...previewScroll.children].forEach(c=>{if(c!==previewEmpty) c.remove();}); if(blocks.length===0){ previewEmpty.style.display='flex'; elementCountEl.textContent='0 个元素'; setStatus('就绪'); return; } previewEmpty.style.display='none'; let docContainer=document.createElement('div'); docContainer.className='document-container'; let formulaCount=0,errCount=0,textCount=0; blocks.forEach(block=>{ if(block.type==='text'){ let d=document.createElement('div'); d.className='document-text'; d.innerHTML=renderTextWithInlineFormula(block.content); docContainer.appendChild(d); textCount++; }else{ formulaCount++; let w=document.createElement('div'); w.className='document-formula'; try{ katex.render(block.content,w,{throwOnError:false,errorColor:'#FF453A',displayMode:true}); }catch(e){ errCount++; let ee=document.createElement('div'); ee.className='formula-error'; ee.textContent='渲染错误: '+e.message; w.appendChild(ee); } docContainer.appendChild(w); } }); previewScroll.appendChild(docContainer); currentDocumentContainer=docContainer; elementCountEl.textContent=(textCount+formulaCount)+' 个元素'; setStatus(errCount>0?'渲染完成，'+errCount+'个公式有语法错误':'渲染完成，共 '+formulaCount+' 个公式', errCount>0?'error':'ok'); }, 300);

  // 转换latex为js表达式（加强）
  function latexToJs(latex) { let s=latex.trim(); s=s.replace(/\\left\s*\(/g,'(').replace(/\\right\s*\)/g,')').replace(/\\left\s*\[/g,'(').replace(/\\right\s*\]/g,')'); for(let i=0;i<5;i++) s=s.replace(/\\frac\{([^{}]*)\}\{([^{}]*)\}/g,'(($1)/($2))'); s=s.replace(/\\sqrt\s*\[([^\]]*)\]\s*\{([^{}]*)\}/g,'Math.pow(($2),(1/($1)))').replace(/\\sqrt\s*\{([^{}]*)\}/g,'Math.sqrt($1)'); s=s.replace(/\^\{([^{}]*)\}/g,'**($1)').replace(/\^(-?\d+\.?\d*)/g,'**($1)').replace(/\^([a-zA-Z])/g,'**$1'); s=s.replace(/\\sin\b/g,'Math.sin').replace(/\\cos\b/g,'Math.cos').replace(/\\tan\b/g,'Math.tan'); s=s.replace(/\\ln\b/g,'Math.log').replace(/\\pi\b/g,'Math.PI'); s=s.replace(/\\abs\b/g,'Math.abs').replace(/\\e\b/g,'Math.E'); s=s.replace(/[{}]/g,''); s=s.replace(/(\d)(x\b)/g,'$1*$2').replace(/(\d)\(/g,'$1*(').replace(/\)\(/g,')*('); return s; }
  function createEvaluator(jsExpr){ try{ let fn=new Function('x','"use strict"; return '+jsExpr+';'); fn(0); return {evaluate:fn, valid:true, error:null}; }catch(e){ return {evaluate:()=>NaN, valid:false, error:e.message}; } }
  function parseSelectedFunctions(selectedText){ let lines=selectedText.split('\n'), funcs=[]; lines.forEach(line=>{ line=line.replace(/^\$+|\$+$/g,'').trim(); let m=line.match(/^y\s*=\s*(.+)$/i); if(m){ let latexExpr=m[1].trim(); let jsExpr=latexToJs(latexExpr); let ev=createEvaluator(jsExpr); funcs.push({latex:latexExpr, js:jsExpr, evaluator:ev}); } }); return funcs; }

  const PLOT_COLORS=['#0A84FF','#FF453A','#32D74B','#FF9F0A','#BF5AF2','#FF375F','#40C8E0','#FF6B35'];
  function niceInterval(range){ if(range<=0) return 1; let rough=range/8; let exp=Math.floor(Math.log10(Math.abs(rough))); let frac=rough/Math.pow(10,exp); let nice=frac<=1.2?1:frac<=2.5?2:frac<=6?5:10; return nice*Math.pow(10,exp); }

  // 计算所有交点 (暴力扫描)
  function findIntersections(funcs, xMin, xMax, steps=5000) {
    if(funcs.length<2) return [];
    let intersections = [];
    let dx = (xMax-xMin)/steps;
    for(let i=0;i<funcs.length;i++) {
      for(let j=i+1;j<funcs.length;j++) {
        let f1=funcs[i], f2=funcs[j];
        if(!f1.evaluator.valid || !f2.evaluator.valid) continue;
        let lastDiff = null;
        let lastX = xMin;
        let lastY1 = f1.evaluator.evaluate(xMin), lastY2 = f2.evaluator.evaluate(xMin);

          let x = xMin + k*dx;
          let y1 = f1.evaluator.evaluate(x), y2 = f2.evaluator.evaluate(x);
          if(isFinite(y1) && isFinite(y2) && Math.abs(y1-y2) < 1e-6 && Math.abs(y1) < 1e6) {
            intersections.push({x: x, y: y1, f1_idx:i, f2_idx:j});
          } else if(lastDiff !== null && lastDiff * (y1-y2) < 0 && isFinite(y1) && isFinite(y2)) {
            let x0 = lastX - lastDiff/( (y1-y2)-lastDiff ) * dx;
            let y0 = (f1.evaluator.evaluate(x0)+f2.evaluator.evaluate(x0))/2;
            if(isFinite(y0)) intersections.push({x: x0, y: y0, f1_idx:i, f2_idx:j});
          }
          lastDiff = y1-y2; lastX = x; lastY1=y1; lastY2=y2;
        }
      }
    }
    // 去重
    let uniq=[];
    intersections.forEach(p=>{ if(!uniq.some(u=>Math.abs(u.x-p.x)<1e-8 && u.f1_idx===p.f1_idx && u.f2_idx===p.f2_idx)) uniq.push(p); });
    return uniq;
  }

  function drawPlot(functions, xMin, xMax, yMin, yMax, canvasSize){
    const W=canvasSize, H=canvasSize, canvas=document.createElement('canvas'), dpr=Math.min(window.devicePixelRatio||1,2.2);
    canvas.width=W*dpr; canvas.height=H*dpr; canvas.style.width=W+'px'; canvas.style.height=H+'px';
    let ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);

    ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=1; ctx.strokeRect(0.5,0.5,W-1,H-1);
    let xInterval=niceInterval(xMax-xMin), yInterval=niceInterval(yMax-yMin);
    ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=0.6;
    let x0=Math.ceil(xMin/xInterval)*xInterval; for(let gx=x0; gx<=xMax+1e-9; gx+=xInterval){ let cx=toCanvasX(gx); ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,H); ctx.stroke(); }
    let y0=Math.ceil(yMin/yInterval)*yInterval; for(let gy=y0; gy<=yMax+1e-9; gy+=yInterval){ let cy=toCanvasY(gy); ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(W,cy); ctx.stroke(); }
    let axisX=Math.max(1,Math.min(W-1,toCanvasX(0))), axisY=Math.max(1,Math.min(H-1,toCanvasY(0)));
    ctx.save(); ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(0,axisY); ctx.lineTo(W,axisY); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.beginPath(); ctx.moveTo(W-1,axisY); ctx.lineTo(W-9,axisY-5); ctx.lineTo(W-9,axisY+5); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.font='italic 13px Georgia, serif'; ctx.textAlign='center'; ctx.textBaseline='bottom'; ctx.fillText('x',W-6,axisY-7);
    ctx.beginPath(); ctx.moveTo(axisX,0); ctx.lineTo(axisX,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(axisX,1); ctx.lineTo(axisX-5,12); ctx.lineTo(axisX+5,12); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.font='italic 13px Georgia, serif'; ctx.fillText('y',axisX+8,14);
    // 更清晰的刻度数字：加大字号、加亮、抗锯齿
    ctx.fillStyle='rgba(255,255,255,0.92)'; ctx.font='bold 12px "Noto Sans SC", "JetBrains Mono", system-ui'; ctx.shadowBlur=0;
    for(let tx=x0; tx<=xMax+1e-9; tx+=xInterval){ let cx=toCanvasX(tx); ctx.beginPath(); ctx.moveTo(cx,axisY-5); ctx.lineTo(cx,axisY+5); ctx.stroke(); if(Math.abs(tx)>1e-9){ ctx.textAlign='center'; ctx.textBaseline='top'; let labelY=(axisY+8<H-14)?axisY+8:axisY-18; let tickVal=Math.abs(tx)<1e-9?'0':(Number.isInteger(tx)?tx.toString():tx.toFixed(3).replace(/\.?0+$/,''));
        ctx.fillText(tickVal, cx, labelY); } }
    for(let ty=y0; ty<=yMax+1e-9; ty+=yInterval){ let cy=toCanvasY(ty); ctx.beginPath(); ctx.moveTo(axisX-5,cy); ctx.lineTo(axisX+5,cy); ctx.stroke(); if(Math.abs(ty)>1e-9){ ctx.textAlign=axisX-8>28?'right':'left'; ctx.textBaseline='middle'; let labelX=(axisX-8>28)?axisX-8:axisX+8; let tickVal=Math.abs(ty)<1e-9?'0':(Number.isInteger(ty)?ty.toString():ty.toFixed(3).replace(/\.?0+$/,''));
        ctx.fillText(tickVal, labelX, cy); } }
    if(xMin<0 && xMax>0 && yMin<0 && yMax>0){ ctx.textAlign='right'; ctx.textBaseline='top'; ctx.fillText('0',axisX-5,axisY+4); } ctx.restore();
    let STEPS=Math.max(W*2.2, 2200), dx=(xMax-xMin)/STEPS;
    functions.forEach((fn,idx)=>{ if(!fn.evaluator.valid) return; let color=PLOT_COLORS[idx%PLOT_COLORS.length]; ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=2.2; ctx.lineJoin='round'; ctx.beginPath(); let penDown=false, prevY=NaN; for(let i=0;i<=STEPS;i++){ let px=xMin+i*dx, py=fn.evaluator.evaluate(px); if(!isFinite(py)||isNaN(py)){ penDown=false; prevY=NaN; continue; } let cpx=toCanvasX(px), cpy=toCanvasY(py); if(cpy<-H||cpy>H*2){ penDown=false; prevY=py; continue; } if(!penDown){ ctx.moveTo(cpx,cpy); penDown=true; }else{ ctx.lineTo(cpx,cpy); } prevY=py; } ctx.stroke(); ctx.restore(); });
    return canvas;
  }

  let plotModalOverlay=document.getElementById('plot-modal-overlay'), currentFunctions=[];
  function openPlotModal(){ let sel=textarea.value.substring(textarea.selectionStart,textarea.selectionEnd).trim(); if(!sel){ showToast('请先选中包含 y = f(x) 的文本'); return; } currentFunctions=parseSelectedFunctions(sel); let listDiv=document.getElementById('plot-functions-list'); listDiv.innerHTML=''; if(currentFunctions.length===0){ let nd=document.createElement('div'); nd.className='fn-no-funcs'; nd.textContent='未找到 y = f(x) 格式的函数'; listDiv.appendChild(nd); document.getElementById('plot-modal-confirm').disabled=true; }else{ document.getElementById('plot-modal-confirm').disabled=false; currentFunctions.forEach((fn,idx)=>{ let chip=document.createElement('div'); chip.className='fn-chip'; let dot=document.createElement('span'); dot.className='fn-color-dot'; dot.style.background=PLOT_COLORS[idx%PLOT_COLORS.length]; let expr=document.createElement('span'); expr.className='fn-expr'; expr.textContent='y = '+fn.latex; chip.appendChild(dot); chip.appendChild(expr); if(!fn.evaluator.valid){ let errSpan=document.createElement('span'); errSpan.className='fn-error'; errSpan.textContent='⚠ 解析失败'; chip.appendChild(errSpan); } listDiv.appendChild(chip); }); } plotModalOverlay.classList.add('visible'); }
  function closePlotModal(){ plotModalOverlay.classList.remove('visible'); }
  function executePlot(){ let xMin=parseFloat(document.getElementById('plot-xmin').value), xMax=parseFloat(document.getElementById('plot-xmax').value), yMin=parseFloat(document.getElementById('plot-ymin').value), yMax=parseFloat(document.getElementById('plot-ymax').value), sizeEl=document.querySelector('input[name="plot-size"]:checked'), size=sizeEl?parseInt(sizeEl.value):600; if(isNaN(xMin)||isNaN(xMax)||isNaN(yMin)||isNaN(yMax)||xMin>=xMax||yMin>=yMax){ showToast('请检查范围设置'); return; } let validFns=currentFunctions.filter(f=>f.evaluator.valid); if(validFns.length===0){ showToast('没有可绘制的有效函数'); return; } closePlotModal(); setTimeout(()=>{ let canvas=drawPlot(validFns,xMin,xMax,yMin,yMax,size); let intersections=findIntersections(validFns, xMin, xMax, Math.min(4000, Math.floor(size*2))); let block=document.createElement('div'); block.className='plot-output-block'; let header=document.createElement('div'); header.className='plot-output-header'; let title=document.createElement('span'); title.className='plot-output-title'; title.textContent='函数图像'; let meta=document.createElement('span'); meta.className='plot-output-meta'; meta.textContent=`x ∈ [${xMin}, ${xMax}]  y ∈ [${yMin}, ${yMax}]`; header.append(title,meta); let wrapper=document.createElement('div'); wrapper.className='plot-canvas-wrapper'; wrapper.appendChild(canvas); let legend=document.createElement('div'); legend.className='plot-legend'; validFns.forEach((fn,idx)=>{ let item=document.createElement('span'); item.className='legend-item'; let dot=document.createElement('span'); dot.className='legend-dot'; dot.style.background=PLOT_COLORS[idx%PLOT_COLORS.length]; item.appendChild(dot); item.appendChild(document.createTextNode(' y = '+fn.latex)); legend.appendChild(item); }); block.append(header,wrapper,legend); if(intersections.length>0){ let interDiv=document.createElement('div'); interDiv.className='intersections-list'; let interTitle=document.createElement('div'); interTitle.className='intersections-title'; interTitle.textContent=`✧ 交点坐标 (共${intersections.length}个) ✧`; interDiv.appendChild(interTitle); intersections.forEach(p=>{ let item=document.createElement('div'); item.className='intersection-item'; item.textContent=`[${p.f1_idx+1}∩${p.f2_idx+1}]  (${p.x.toFixed(5)}, ${p.y.toFixed(5)})`; interDiv.appendChild(item); }); block.appendChild(interDiv); } previewScroll.appendChild(block); block.scrollIntoView({behavior:'smooth',block:'nearest'}); showToast(`绘制了 ${validFns.length} 个函数，找到 ${intersections.length} 个交点`); },200); }
  document.getElementById('plot-modal-close').addEventListener('click',closePlotModal);
  document.getElementById('plot-modal-cancel').addEventListener('click',closePlotModal);
  document.getElementById('plot-modal-confirm').addEventListener('click',executePlot);
  plotModalOverlay.addEventListener('click',e=>{if(e.target===plotModalOverlay) closePlotModal();});

  function smartConvert(text){ let t=text.replace(/([a-zA-Z])(\d+)/g,'$1^{$2}').replace(/([a-zA-Z])_([a-zA-Z0-9]+)/g,'$1_{$2}'); let greek={alpha:'\\alpha',beta:'\\beta',gamma:'\\gamma',delta:'\\delta',epsilon:'\\epsilon',zeta:'\\zeta',eta:'\\eta',theta:'\\theta',lambda:'\\lambda',mu:'\\mu',pi:'\\pi',sigma:'\\sigma',phi:'\\phi',omega:'\\omega'}; t=t.replace(new RegExp('\\b('+Object.keys(greek).join('|')+')\\b','g'),m=>greek[m]||m); t=t.replace(/([^\s]+)\s+\/\s+([^\s]+)/g,'\\frac{$1}{$2}'); return '$$'+t+'$$'; }
  function applySmartConvert(){ let start=textarea.selectionStart,end=textarea.selectionEnd; if(start===end){ showToast('请先选中要转换的文本'); return; } let selected=textarea.value.substring(start,end); let converted=smartConvert(selected); textarea.value=textarea.value.substring(0,start)+converted+textarea.value.substring(end); textarea.setSelectionRange(start+converted.length,start+converted.length); textarea.focus(); showToast('智能转换完成'); refreshPreview(); }

  async function exportPreviewAsImage(){ if(!currentDocumentContainer){ showToast('没有可导出的内容'); return; } try{ setStatus('导出图片...','working'); let temp=document.createElement('div'); temp.style.cssText='background:#fff;padding:40px;display:inline-block;'; let clone=currentDocumentContainer.cloneNode(true); clone.style.cssText='background:#fff;color:#000;box-shadow:none;'; clone.querySelectorAll('.document-text, .katex').forEach(el=>el.style.color='#000'); temp.appendChild(clone); document.body.appendChild(temp); let dataUrl=await htmlToImage.toPng(temp,{backgroundColor:'#fff',pixelRatio:3.5,quality:1}); document.body.removeChild(temp); let a=document.createElement('a'); a.href=dataUrl; a.download='latex_'+new Date().toISOString().slice(0,19).replace(/:/g,'-')+'.png'; a.click(); setStatus('导出成功'); showToast('图片已下载'); }catch(e){ setStatus('导出失败','error'); showToast('导出失败'); } }
  async function exportAsPDF(){ if(!currentDocumentContainer){ showToast('没有可导出的内容'); return; } setStatus('准备PDF...','working'); try{ let clone=currentDocumentContainer.cloneNode(true); clone.style.cssText='background:#fff;color:#000;padding:32px 40px;'; let wrapper=document.createElement('div'); wrapper.style.cssText='position:absolute;top:-9999px;left:-9999px;background:#fff;width:800px;padding:20px;'; wrapper.appendChild(clone); document.body.appendChild(wrapper); await new Promise(r=>setTimeout(r,300)); let opt={margin:[0.5,0.5,0.5,0.5],filename:'latex_'+new Date().toISOString().slice(0,10)+'.pdf',image:{type:'jpeg',quality:0.98},html2canvas:{scale:2.5,backgroundColor:'#fff'},jsPDF:{unit:'in',format:'a4',orientation:'portrait'}}; let pdfBlob=await html2pdf().set(opt).from(wrapper).outputPdf('blob'); document.body.removeChild(wrapper); let url=URL.createObjectURL(pdfBlob); let a=document.createElement('a'); a.href=url; a.download='latex_document.pdf'; a.click(); setTimeout(()=>{ URL.revokeObjectURL(url); },200); setStatus('PDF已下载'); showToast('PDF已下载'); }catch(e){ setStatus('PDF导出失败','error'); showToast('PDF生成失败'); } }

  document.getElementById('btn-new').addEventListener('click',()=>{ textarea.value=''; refreshPreview(); showToast('新建文档'); });
  document.getElementById('btn-open').addEventListener('click',()=>document.getElementById('file-input').click());
  document.getElementById('btn-save').addEventListener('click',()=>{ let blob=new Blob([textarea.value],{type:'text/plain'}); saveAs(blob,'document.tex'); showToast('已保存'); });
  document.getElementById('btn-export-preview').addEventListener('click',exportPreviewAsImage);
  document.getElementById('btn-export-pdf').addEventListener('click',exportAsPDF);
  document.getElementById('btn-smart-convert').addEventListener('click',applySmartConvert);
  document.getElementById('btn-plot').addEventListener('click',openPlotModal);
  document.getElementById('btn-plot-pane').addEventListener('click',openPlotModal);
  document.getElementById('file-input').addEventListener('change',e=>{ let f=e.target.files[0]; if(f){ let r=new FileReader(); r.onload=ev=>{ textarea.value=ev.target.result; refreshPreview(); showToast(f.name); }; r.readAsText(f,'utf-8'); } e.target.value=''; });
  textarea.addEventListener('input',refreshPreview);
  document.addEventListener('keydown',e=>{ let mod=e.ctrlKey||e.metaKey; if(!mod) return; if(e.key.toLowerCase()==='k'){ e.preventDefault(); applySmartConvert(); }else if(e.key.toLowerCase()==='p'){ e.preventDefault(); openPlotModal(); }else if(e.key.toLowerCase()==='n'){ e.preventDefault(); textarea.value=''; refreshPreview(); }else if(e.key.toLowerCase()==='o'){ e.preventDefault(); document.getElementById('file-input').click(); }else if(e.key.toLowerCase()==='s'){ e.preventDefault(); let blob=new Blob([textarea.value],{type:'text/plain'}); saveAs(blob,'document.tex'); showToast('已保存'); } });
  let resizer=document.getElementById('resizer'), editorPane=document.getElementById('editor-pane'), mainEl=document.getElementById('main'), isResizing=false; resizer.addEventListener('mousedown',e=>{ isResizing=true; resizer.classList.add('dragging'); e.preventDefault(); }); document.addEventListener('mousemove',e=>{ if(!isResizing) return; let rect=mainEl.getBoundingClientRect(); let w=Math.max(280,Math.min(e.clientX-rect.left,rect.width-280)); editorPane.style.width=w+'px'; }); document.addEventListener('mouseup',()=>{ if(isResizing){ isResizing=false; resizer.classList.remove('dragging'); } });

  const DEMO='# LaTeX Editor with Function Plotter\n\n欢迎使用增强版编辑器。支持行内公式 $e^{i\\pi} + 1 = 0$ 和独立公式块。\n\n$$\\int_{-\\infty}^{\\infty} e^{-x^2} dx = \\sqrt{\\pi}$$\n\n## 绘图功能\n\n选中下方一行或多行，按 **Ctrl+P**（或点击"绘图"按钮）即可绘制：\n\ny = x^2\ny = \\sin(x)\ny = \\frac{1}{x}\n\n提示：可多选几行同时绘制到同一坐标系，自动计算并显示交点坐标。\n\n## 智能转换\n\n选中 `x2 + sin(x)` 再按 **Ctrl+K** 可自动转换为 LaTeX 公式。';
  textarea.value=DEMO; refreshPreview(); setStatus('就绪 — 使用 Ctrl+P 绘制函数图像 · 交点自动显示 · 刻度更清晰');
