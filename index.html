<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
<title>LaTeX Editor - 支持行内公式 & 函数绘图</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<!-- 绘图库 -->
<script src="https://cdn.jsdelivr.net/npm/function-plot@1.24.3/dist/function-plot.js"></script>

<style>
:root {
  --bg-base:        #1E1E1E;
  --bg-card:        #2B2B2B;
  --bg-toolbar:     #242424;
  --bg-statusbar:   #1A1A1A;
  --border:         rgba(255,255,255,0.08);
  --border-focus:   rgba(255,255,255,0.22);
  --accent:         #0A84FF;
  --accent-hover:   #1A90FF;
  --accent-dim:     rgba(10,132,255,0.18);
  --text-primary:   rgba(255,255,255,0.88);
  --text-secondary: rgba(255,255,255,0.45);
  --text-muted:     rgba(255,255,255,0.25);
  --btn-bg:         rgba(255,255,255,0.07);
  --btn-hover:      rgba(255,255,255,0.12);
  --btn-active:     rgba(255,255,255,0.05);
  --danger:         #FF453A;
  --success:        #32D74B;
  --radius:         12px;
  --radius-sm:      8px;
  --radius-xs:      6px;
  --font-ui:        "SF Pro Display","PingFang SC","Inter",system-ui,sans-serif;
  --font-mono:      "SF Mono","Fira Code","JetBrains Mono",monospace;
  --shadow-card:    0 2px 16px rgba(0,0,0,0.45), 0 0 0 0.5px rgba(255,255,255,0.06);
  --shadow-btn:     0 1px 4px rgba(0,0,0,0.4);
  --transition:     0.2s cubic-bezier(0.4,0,0.2,1);
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left:   env(safe-area-inset-left, 0px);
  --safe-right:  env(safe-area-inset-right, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; overscroll-behavior: none; }
body {
  height: 100%;
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  min-width: 320px;
  padding-top: var(--safe-top);
  padding-left: var(--safe-left);
  padding-right: var(--safe-right);
}

#toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 16px;
  background: var(--bg-toolbar);
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
#toolbar::-webkit-scrollbar { display: none; }
.toolbar-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.04em;
  margin-right: 4px;
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}
.toolbar-divider {
  width: 0.5px;
  height: 20px;
  background: var(--border);
  margin: 0 2px;
  flex-shrink: 0;
}
.toolbar-spacer { flex: 1; min-width: 6px; }
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 6px 12px;
  min-height: 32px;
  background: var(--btn-bg);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background var(--transition), transform var(--transition);
  user-select: none;
  white-space: nowrap;
  box-shadow: var(--shadow-btn);
  outline: none;
  flex-shrink: 0;
}
.btn:hover   { background: var(--btn-hover); border-color: var(--border-focus); transform: scale(0.98); }
.btn:active  { background: var(--btn-active); transform: scale(0.96); }
.btn.accent  { background: var(--accent); border-color: transparent; color: #fff; }
.btn.accent:hover  { background: var(--accent-hover); box-shadow: 0 0 0 3px var(--accent-dim); }
.shortcut-badge {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  padding: 1px 5px;
  background: rgba(255,255,255,0.06);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 4px;
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  flex-shrink: 0;
}

#main {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}
#editor-pane {
  display: flex;
  flex-direction: column;
  width: 50%;
  min-width: 360px;
  border-right: 0.5px solid var(--border);
  background: var(--bg-base);
  flex-shrink: 0;
  min-height: 0;
}
.pane-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 14px;
  background: var(--bg-toolbar);
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}
.pane-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-secondary);
}
#editor-textarea {
  flex: 1;
  width: 100%;
  background: var(--bg-card);
  color: var(--text-primary);
  border: none;
  resize: none;
  font-family: var(--font-mono);
  font-size: 13.5px;
  line-height: 1.75;
  padding: 20px 22px;
  outline: none;
  tab-size: 2;
  caret-color: var(--accent);
  min-height: 0;
  overflow-y: auto;
}
#editor-textarea::selection { background: rgba(10,132,255,0.3); }
.editor-hint {
  font-size: 11px;
  color: var(--text-muted);
  padding: 6px 14px;
  background: var(--bg-toolbar);
  border-top: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  overflow-x: auto;
}
.hint-item { display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
kbd {
  display: inline-flex; align-items: center;
  padding: 1px 5px;
  background: rgba(255,255,255,0.07);
  border: 0.5px solid rgba(255,255,255,0.12);
  border-radius: 4px;
  font-size: 10.5px;
  font-family: var(--font-mono);
  color: var(--text-secondary);
}

#resizer {
  width: 4px;
  background: transparent;
  cursor: col-resize;
  flex-shrink: 0;
  z-index: 5;
  transition: background 0.2s;
}
#resizer:hover { background: rgba(10,132,255,0.4); }
#resizer.dragging { background: var(--accent); }

#preview-pane {
  display: flex;
  flex-direction: column;
  flex: 1;
  background: var(--bg-base);
  overflow: hidden;
  min-height: 0;
}
#preview-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
#preview-scroll::-webkit-scrollbar { width: 6px; }
#preview-scroll::-webkit-scrollbar-track { background: transparent; }
#preview-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
#preview-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 14px;
  opacity: 0.4;
  pointer-events: none;
  padding: 40px;
  text-align: center;
}
#preview-empty p {
  font-size: 13px;
  color: var(--text-secondary);
  max-width: 220px;
  line-height: 1.6;
}

.document-container {
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  padding: 28px 32px;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.document-container:hover {
  border-color: rgba(255,255,255,0.14);
  box-shadow: 0 4px 24px rgba(0,0,0,0.55), 0 0 0 0.5px rgba(255,255,255,0.1);
}

.document-text {
  margin: 0.75em 0;
  line-height: 1.7;
  white-space: pre-wrap;
  color: var(--text-primary);
  font-size: 14px;
}
.document-text h1 { font-size: 1.8em; margin: 0.67em 0; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
.document-text h2 { font-size: 1.5em; margin: 0.75em 0; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
.document-text h3 { font-size: 1.25em; margin: 0.83em 0; }
.document-text code { background: rgba(255,255,255,0.07); padding: 2px 6px; border-radius: 4px; font-family: var(--font-mono); font-size: 0.9em; }
.document-text strong { font-weight: 600; }
.document-text em { font-style: italic; }
.document-text .inline-formula { display: inline; margin: 0 0.1em; }
.document-formula { margin: 1.2em 0; text-align: center; overflow-x: auto; padding: 0.25em 0; }
.document-formula .katex-display { margin: 0; }
.katex { color: rgba(255,255,255,0.9) !important; }
.formula-error { color: var(--danger); font-size: 12px; font-family: var(--font-mono); padding: 8px 12px; background: rgba(255,69,58,0.1); border-radius: var(--radius-xs); border-left: 2px solid var(--danger); display: inline-block; text-align: left; }

/* 绘图容器样式 */
.plot-container {
  margin: 1.5em 0;
  background: #fafafa;
  border-radius: 12px;
  padding: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.plot-graph {
  width: 100%;
  height: auto;
  min-height: 320px;
  background: #ffffff;
  border-radius: 8px;
}
.plot-caption {
  font-size: 12px;
  color: #4b5563;
  text-align: center;
  margin-top: 8px;
  font-family: var(--font-mono);
}

/* 弹窗遮罩 */
.modal-mask {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}
.modal-panel {
  background: var(--bg-card);
  border-radius: 24px;
  width: min(90vw, 520px);
  max-height: 85vh;
  overflow-y: auto;
  padding: 24px 28px;
  border: 0.5px solid var(--border);
  box-shadow: 0 20px 35px rgba(0,0,0,0.5);
  color: var(--text-primary);
}
.modal-panel h3 {
  font-size: 1.5rem;
  margin-bottom: 1rem;
  font-weight: 600;
}
.modal-panel label {
  display: block;
  margin-top: 12px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
}
.modal-panel input[type="range"] {
  width: 100%;
  margin: 8px 0;
  background: var(--border);
  height: 3px;
  border-radius: 3px;
}
.modal-panel .param-row {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.param-col {
  flex: 1;
}
.value-display {
  font-size: 12px;
  color: var(--accent);
  font-family: var(--font-mono);
}
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  margin-top: 28px;
}
#statusbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 16px;
  padding-bottom: calc(6px + var(--safe-bottom));
  background: var(--bg-statusbar);
  border-top: 0.5px solid var(--border);
  flex-shrink: 0;
  font-size: 11.5px;
  color: var(--text-secondary);
  font-family: var(--font-mono);
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); flex-shrink: 0; transition: background 0.3s; }
.status-dot.error   { background: var(--danger); }
.status-dot.working { background: #FF9F0A; animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.35 } }
#status-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#toast {
  position: fixed;
  bottom: calc(52px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  padding: 9px 18px;
  background: rgba(44,44,46,0.96);
  border: 0.5px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  font-size: 13px;
  color: var(--text-primary);
  backdrop-filter: blur(14px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 1000;
  white-space: nowrap;
  max-width: calc(100vw - 40px);
  text-align: center;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 767px) {
  #main { flex-direction: column; }
  #editor-pane { width: 100% !important; min-width: unset; height: 40dvh; border-right: none; border-bottom: 0.5px solid var(--border); }
  #preview-pane { height: 60dvh; flex: none; }
  #resizer { display: none; }
  .document-container { padding: 16px 20px; }
}
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <div class="toolbar-title">📐 LaTeX Editor</div>
    <div class="toolbar-divider"></div>
    <button class="btn" id="btn-new">新建</button>
    <button class="btn" id="btn-open">打开</button>
    <input type="file" id="file-input" accept=".tex,.txt,.md" style="display:none" />
    <button class="btn" id="btn-save">保存</button>
    <div class="toolbar-divider"></div>
    <button class="btn accent" id="btn-export-preview">导出预览</button>
    <button class="btn" id="btn-plot-selected">📈 绘制函数 (⌘P)</button>
    <div class="toolbar-spacer"></div>
    <div class="shortcut-badge">⌘K 智能转换 | ⌘P 绘图</div>
  </div>

  <div id="main">
    <div id="editor-pane">
      <div class="pane-header">
        <span class="pane-label">编辑器</span>
        <button class="btn" id="btn-smart-convert" style="padding:4px 10px">✨ 智能转换 (⌘K)</button>
      </div>
      <textarea id="editor-textarea" spellcheck="false" placeholder="输入文本，行内公式用 $...$，独立公式用 $$...$$，并支持选中类似 y = f(x) 的表达式后点击绘图或按 ⌘P"></textarea>
      <div class="editor-hint">
        <span class="hint-item"><kbd>$...$</kbd> 行内公式</span>
        <span class="hint-item"><kbd>$$...$$</kbd> 独立公式</span>
        <span class="hint-item"><kbd>⌘K</kbd> 智能转换</span>
        <span class="hint-item"><kbd>⌘P</kbd> 绘制选中函数</span>
      </div>
    </div>
    <div id="resizer"></div>
    <div id="preview-pane">
      <div class="pane-header">
        <span class="pane-label">预览</span>
        <span id="status-element-count" style="font-size:11px;color:var(--text-muted);">0 个元素</span>
      </div>
      <div id="preview-scroll">
        <div id="preview-empty">
          <p>输入文本和公式后将在此实时渲染<br>行内公式: hi $x/c$</p>
        </div>
      </div>
    </div>
  </div>

  <div id="statusbar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">就绪</span>
  </div>
</div>
<div id="toast"></div>

<script>
'use strict';
let currentPlotId = 0;
let plotFunctionsQueue = []; // 存储函数字符串列表 {expr, color?}
let modalRoot = null;

function waitForKatex(cb, tries=0) { if (typeof katex !== 'undefined') { cb(); return; } if (tries > 50) { cb(); return; } setTimeout(()=>waitForKatex(cb,tries+1),100); }
waitForKatex(init);

function init() {
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  const DEBOUNCE_DELAY = isMobile ? 500 : 300;
  const textarea = document.getElementById('editor-textarea');
  const previewScroll = document.getElementById('preview-scroll');
  const previewEmpty = document.getElementById('preview-empty');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const elementCountEl = document.getElementById('status-element-count');
  const toast = document.getElementById('toast');
  let toastTimer = null;
  let currentDocumentContainer = null;

  function setStatus(msg, type) { statusText.textContent = msg; statusDot.className = 'status-dot' + (type !== 'ok' ? ' ' + type : ''); }
  function showToast(msg, duration=2400) { toast.textContent = msg; toast.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(()=>toast.classList.remove('show'), duration); }
  function haptic(pattern) { try { if (navigator.vibrate) navigator.vibrate(pattern || 10); } catch(_) {} }

  // 渲染基本markdown
  function renderMarkdownBasic(text) {
    let html = text.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
    html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>').replace(/^## (.*$)/gm, '<h2>$1</h2>').replace(/^# (.*$)/gm, '<h1>$1</h1>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/__(.+?)__/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>').replace(/_(.+?)_/g, '<em>$1</em>');
    html = html.replace(/`(.+?)`/g, '<code>$1</code>').replace(/\n/g, '<br>');
    return html;
  }
  function renderTextWithInlineFormula(text) {
    const inlineRegex = /\$([^\$]+?)\$/g;
    let lastIndex = 0, result = '', match;
    while ((match = inlineRegex.exec(text)) !== null) {
      result += renderMarkdownBasic(text.substring(lastIndex, match.index));
      const formula = match[1].trim();
      try {
        if (typeof katex !== 'undefined') result += '<span class="inline-formula">' + katex.renderToString(formula, { throwOnError: false, errorColor: '#FF453A', displayMode: false }) + '</span>';
        else result += `<span class="formula-error">[KaTeX未加载] $${formula}$</span>`;
      } catch(err) { result += `<span class="formula-error">❌ ${err.message}</span>`; }
      lastIndex = match.index + match[0].length;
    }
    result += renderMarkdownBasic(text.substring(lastIndex));
    return result;
  }

  function parseContent(source) {
    const blocks = [], re = /\$\$([\s\S]+?)\$\$/g;
    let lastIndex = 0, match;
    while ((match = re.exec(source)) !== null) {
      if (match.index > lastIndex) { const txt = source.substring(lastIndex, match.index); if(txt) blocks.push({ type: 'text', content: txt }); }
      blocks.push({ type: 'displayFormula', content: match[1].trim() });
      lastIndex = match.index + match[0].length;
    }
    if (lastIndex < source.length) { const remaining = source.substring(lastIndex); if(remaining) blocks.push({ type: 'text', content: remaining }); }
    return blocks;
  }

  // 动态插入绘图块 (在预览区末尾增加一个独立绘图块)
  function addPlotToPreview(functionsArray, xMin, xMax, yMin, yMax, widthPx = 500) {
    if (!currentDocumentContainer) {
      // 若没有文档容器，强制创建空文档
      const emptyBlocks = parseContent(textarea.value);
      if(emptyBlocks.length===0) textarea.value = " ";
      refreshPreview();
    }
    if (!currentDocumentContainer) return;
    const plotDiv = document.createElement('div');
    plotDiv.className = 'plot-container';
    const graphId = `funcplot_${Date.now()}_${Math.random()}`;
    plotDiv.innerHTML = `<div id="${graphId}" class="plot-graph" style="width:100%; height:${Math.min(400, Math.max(280, widthPx*0.6))}px; background:#fff; border-radius:8px;"></div><div class="plot-caption">📈 函数图像 | x∈[${xMin},${xMax}] y∈[${yMin},${yMax}]</div>`;
    currentDocumentContainer.appendChild(plotDiv);
    // 使用 function-plot 渲染
    if (typeof functionPlot !== 'undefined') {
      const functionsToPlot = functionsArray.map(fn => {
        if (typeof fn === 'string') return { fn: fn, color: '#0A84FF' };
        return fn;
      });
      try {
        functionPlot({
          target: `#${graphId}`,
          width: plotDiv.clientWidth || 500,
          height: Math.min(400, Math.max(280, widthPx*0.6)),
          xAxis: { domain: [xMin, xMax] },
          yAxis: { domain: [yMin, yMax] },
          grid: true,
          data: functionsToPlot
        });
        setStatus(`已绘制 ${functionsArray.length} 条曲线`, 'ok');
        showToast(`📊 绘图成功: ${functionsArray.length} 个函数`);
      } catch(e) {
        plotDiv.innerHTML += `<div class="formula-error" style="margin-top:8px;">绘图错误: ${e.message}</div>`;
        setStatus('绘图失败', 'error');
      }
    } else {
      plotDiv.innerHTML += `<div class="formula-error">绘图库未加载，请刷新页面重试</div>`;
    }
    elementCountEl.textContent = `${currentDocumentContainer.children.length} 个元素(含绘图)`;
  }

  // 核心: 解析选中的文本提取 y=f(x) 表达式
  function extractFunctionsFromSelection(selectedText) {
    const lines = selectedText.split(/\r?\n/);
    const functions = [];
    for (let line of lines) {
      line = line.trim();
      if (!line) continue;
      // 匹配 y = 表达式 或 f(x) = 表达式 或 直接表达式(但最好有等号)
      let match = line.match(/^(?:y\s*=\s*|f\(x\)\s*=\s*)(.+)$/i);
      if (match) {
        let expr = match[1].trim();
        if (expr) functions.push(expr);
      } else if (line.includes('=')) {
        let parts = line.split('=');
        if (parts.length >= 2) {
          let right = parts.slice(1).join('=').trim();
          if (right) functions.push(right);
        }
      } else {
        // 试探: 若看起来像数学表达式 (包含 x, 运算符)
        if (/[xX]/.test(line) && /[\+\-\*\/\^\(\)]/.test(line)) functions.push(line);
      }
    }
    return functions;
  }

  // 弹出绘图配置窗口
  function showPlotDialog(expressions) {
    if (!expressions || expressions.length === 0) {
      showToast('未选中有效的函数表达式 (需要类似 y = x^2 或包含 x 的表达式)');
      return;
    }
    // 移除已有模态框
    if (modalRoot) modalRoot.remove();
    const modal = document.createElement('div');
    modal.className = 'modal-mask';
    modal.innerHTML = `
      <div class="modal-panel">
        <h3>📐 函数绘图配置</h3>
        <p style="margin-bottom:12px;font-size:13px;">已解析 ${expressions.length} 个函数: <span style="font-family:monospace;background:#333;padding:2px 6px;border-radius:6px;">${expressions.map(e=>e.slice(0,30)).join(', ')}</span></p>
        <div class="param-row">
          <div class="param-col"><label>X 轴范围</label><input type="range" id="xmin-slider" min="-20" max="20" step="0.5" value="-5"><span id="xmin-val" class="value-display"> -5.0</span></div>
          <div class="param-col"><input type="range" id="xmax-slider" min="-20" max="20" step="0.5" value="5"><span id="xmax-val" class="value-display"> 5.0</span></div>
        </div>
        <div class="param-row">
          <div class="param-col"><label>Y 轴范围</label><input type="range" id="ymin-slider" min="-20" max="20" step="0.5" value="-5"><span id="ymin-val" class="value-display"> -5.0</span></div>
          <div class="param-col"><input type="range" id="ymax-slider" min="-20" max="20" step="0.5" value="5"><span id="ymax-val" class="value-display"> 5.0</span></div>
        </div>
        <label>图像尺寸 (宽度滑块) <input type="range" id="size-slider" min="280" max="700" step="10" value="480"><span id="size-val" class="value-display"> 480px</span></label>
        <div class="modal-actions">
          <button class="btn" id="modal-cancel">取消</button>
          <button class="btn accent" id="modal-confirm">绘制图像</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    modalRoot = modal;
    const xminS = modal.querySelector('#xmin-slider'), xmaxS = modal.querySelector('#xmax-slider');
    const yminS = modal.querySelector('#ymin-slider'), ymaxS = modal.querySelector('#ymax-slider');
    const sizeS = modal.querySelector('#size-slider');
    const xminV = modal.querySelector('#xmin-val'), xmaxV = modal.querySelector('#xmax-val');
    const yminV = modal.querySelector('#ymin-val'), ymaxV = modal.querySelector('#ymax-val');
    const sizeV = modal.querySelector('#size-val');
    function sync() {
      let xmin = parseFloat(xminS.value), xmax = parseFloat(xmaxS.value);
      let ymin = parseFloat(yminS.value), ymax = parseFloat(ymaxS.value);
      if (xmin >= xmax) { if (xminS === document.activeElement) xmaxS.value = xmin + 0.5; else xminS.value = xmax - 0.5; xmin = parseFloat(xminS.value); xmax = parseFloat(xmaxS.value); }
      if (ymin >= ymax) { if (yminS === document.activeElement) ymaxS.value = ymin + 0.5; else yminS.value = ymax - 0.5; ymin = parseFloat(yminS.value); ymax = parseFloat(ymaxS.value); }
      xminV.innerText = ` ${xmin.toFixed(1)}`; xmaxV.innerText = ` ${xmax.toFixed(1)}`;
      yminV.innerText = ` ${ymin.toFixed(1)}`; ymaxV.innerText = ` ${ymax.toFixed(1)}`;
      sizeV.innerText = ` ${sizeS.value}px`;
    }
    xminS.addEventListener('input', sync); xmaxS.addEventListener('input', sync);
    yminS.addEventListener('input', sync); ymaxS.addEventListener('input', sync);
    sizeS.addEventListener('input', sync);
    sync();
    modal.querySelector('#modal-cancel').onclick = () => { modal.remove(); modalRoot=null; };
    modal.querySelector('#modal-confirm').onclick = () => {
      const xmin = parseFloat(xminS.value), xmax = parseFloat(xmaxS.value);
      const ymin = parseFloat(yminS.value), ymax = parseFloat(ymaxS.value);
      const width = parseFloat(sizeS.value);
      modal.remove(); modalRoot = null;
      // 构建绘图对象数组 (支持多个曲线不同颜色)
      const colorPalette = ['#0A84FF', '#FF9F0A', '#32D74B', '#BF5AF2', '#FF453A', '#64D2FF'];
      const plotItems = expressions.map((expr, idx) => ({ fn: expr, color: colorPalette[idx % colorPalette.length] }));
      addPlotToPreview(plotItems, xmin, xmax, ymin, ymax, width);
      setStatus(`绘制 ${expressions.length} 条曲线`, 'ok');
      haptic(12);
    };
  }

  // 绘图入口: 获取选中文本，解析函数表达式
  function plotSelectedFunction() {
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;
    let selected = '';
    if (start !== end) {
      selected = textarea.value.substring(start, end);
    } else {
      // 若未选中，尝试智能抓取光标所在行
      const lines = textarea.value.substring(0, textarea.value.length).split(/\r?\n/);
      let caretLineIdx = 0, cumLen = 0;
      for (let i=0;i<lines.length;i++) {
        if (start <= cumLen + lines[i].length + 1) { caretLineIdx = i; break; }
        cumLen += lines[i].length + 1;
      }
      selected = lines[caretLineIdx].trim();
      if (!selected) { showToast('请选中一个函数表达式 (如 y = x^2)'); return; }
    }
    if (!selected.trim()) { showToast('请先选中要绘制的函数 (y=f(x) 格式)'); return; }
    const funcs = extractFunctionsFromSelection(selected);
    if (funcs.length === 0) {
      showToast('未识别到函数，请选中类似 y = x^2 或 sin(x) 的表达式');
      return;
    }
    showPlotDialog(funcs);
  }

  // 原有渲染刷新 (保持绘图块不丢失)
  let refreshPreview = debounce(() => {
    const blocks = parseContent(textarea.value);
    Array.from(previewScroll.children).forEach(c => { if (c !== previewEmpty) c.remove(); });
    if (blocks.length === 0) { previewEmpty.style.display = 'flex'; elementCountEl.textContent = '0 个元素'; setStatus('就绪'); currentDocumentContainer=null; return; }
    previewEmpty.style.display = 'none';
    const docContainer = document.createElement('div');
    docContainer.className = 'document-container';
    let formulaCount=0, errCount=0, textBlockCount=0;
    blocks.forEach(block => {
      if (block.type === 'text') {
        const textDiv = document.createElement('div'); textDiv.className = 'document-text';
        textDiv.innerHTML = renderTextWithInlineFormula(block.content);
        docContainer.appendChild(textDiv); textBlockCount++;
      } else if (block.type === 'displayFormula') {
        formulaCount++;
        const wrapper = document.createElement('div'); wrapper.className = 'document-formula';
        try { if(typeof katex !=='undefined') katex.render(block.content, wrapper, { throwOnError: false, errorColor:'#FF453A', displayMode:true }); 
        else wrapper.textContent = '[KaTeX未加载] '+block.content;
        } catch(err){ errCount++; wrapper.innerHTML = `<div class="formula-error">渲染错误: ${err.message}</div>`; }
        docContainer.appendChild(wrapper);
      }
    });
    previewScroll.appendChild(docContainer);
    currentDocumentContainer = docContainer;
    elementCountEl.textContent = (textBlockCount + formulaCount) + ' 个元素';
    setStatus(errCount? `渲染完成，${errCount}个公式错误` : '就绪');
  }, DEBOUNCE_DELAY);
  window.refreshPreview = refreshPreview;

  // 绑定按钮
  document.getElementById('btn-new').addEventListener('click', ()=>{ textarea.value=''; refreshPreview(); showToast('新建文档'); });
  document.getElementById('btn-open').addEventListener('click', ()=>document.getElementById('file-input').click());
  document.getElementById('btn-save').addEventListener('click', ()=>{ const blob = new Blob([textarea.value], {type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='document.tex'; a.click(); showToast('已保存'); });
  document.getElementById('btn-export-preview').addEventListener('click', ()=>{ if(currentDocumentContainer) exportAsImage(); else showToast('无内容'); });
  document.getElementById('btn-smart-convert').addEventListener('click', applySmartConvert);
  document.getElementById('btn-plot-selected').addEventListener('click', plotSelectedFunction);
  document.getElementById('file-input').addEventListener('change', e=>{ if(e.target.files[0]){ const reader=new FileReader(); reader.onload=ev=>{ textarea.value=ev.target.result; refreshPreview(); showToast('打开成功'); }; reader.readAsText(e.target.files[0]); } e.target.value=''; });
  textarea.addEventListener('input', refreshPreview);
  document.addEventListener('keydown', e=>{ const mod = e.ctrlKey||e.metaKey; if(mod && e.key.toLowerCase()==='p'){ e.preventDefault(); plotSelectedFunction(); } else if(mod && e.key.toLowerCase()==='k'){ e.preventDefault(); applySmartConvert(); } else if(mod && e.key.toLowerCase()==='s'){ e.preventDefault(); document.getElementById('btn-save').click(); } else if(mod && e.key.toLowerCase()==='n'){ e.preventDefault(); document.getElementById('btn-new').click(); } });
  
  function applySmartConvert() { /* 原有智能转换简略实现 */ const start=textarea.selectionStart, end=textarea.selectionEnd; if(start===end){ showToast('请先选中文本'); return; } let sel=textarea.value.substring(start,end); sel = sel.replace(/([a-zA-Z])(\d+)/g,'$1^{$2}').replace(/([a-zA-Z])_([a-zA-Z0-9]+)/g,'$1_{$2}'); const greek={alpha:'\\alpha',beta:'\\beta',gamma:'\\gamma',delta:'\\delta',pi:'\\pi',theta:'\\theta'}; Object.keys(greek).forEach(g=>{ sel=sel.replace(new RegExp(`\\b${g}\\b`,'g'),greek[g]); }); sel=sel.replace(/([^\s]+)\s+\/\s+([^\s]+)/g,'\\frac{$1}{$2}'); const converted='$$'+sel+'$$'; textarea.value = textarea.value.substring(0,start)+converted+textarea.value.substring(end); refreshPreview(); showToast('智能转换完成'); }
  async function exportAsImage() { if(!currentDocumentContainer){ showToast('无预览内容'); return; } if(typeof htmlToImage ==='undefined'){ showToast('库未加载'); return; } try{ const cloneDiv = currentDocumentContainer.cloneNode(true); cloneDiv.style.backgroundColor='#ffffff'; cloneDiv.style.color='#000000'; const container=document.createElement('div'); container.style.padding='24px'; container.style.background='#fff'; container.appendChild(cloneDiv); document.body.appendChild(container); const dataUrl=await htmlToImage.toPng(container,{backgroundColor:'#ffffff',pixelRatio:2}); document.body.removeChild(container); const a=document.createElement('a'); a.href=dataUrl; a.download='latex_export.png'; a.click(); showToast('导出图片成功'); }catch(e){ showToast('导出失败'); } }
  function debounce(fn,delay){ let t; return function(){ clearTimeout(t); t=setTimeout(()=>fn.apply(this,arguments),delay); }; }
  textarea.value = `# 函数绘图示例

选中下方任意公式，点击工具栏「绘制函数」或按 ⌘P

y = x^2  
y = sin(x)  
y = x^3 - 2*x

也可以同时选中多行，例如：

y = cos(x)
y = x/2 + 1

然后绘图即可显示在同一坐标系上。`;
  refreshPreview();
  setStatus('就绪 — 选中 y=f(x) 按 ⌘P 绘图');
}
</script>
</body>
</html>
