<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
<meta name="theme-color" content="#1A1A1A" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#242424" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="LaTeX Editor" />
<meta name="mobile-web-app-capable" content="yes" />
<title>LaTeX Editor</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root {
  --bg-base:        #1E1E1E;
  --bg-card:        #2B2B2B;
  --bg-toolbar:     #242424;
  --bg-statusbar:   #1A1A1A;
  --border:         rgba(255,255,255,0.08);
  --border-focus:   rgba(255,255,255,0.22);
  --accent:         #0A84FF;
  --accent-hover:   #1A90FF;
  --accent-dim:     rgba(10,132,255,0.18);
  --text-primary:   rgba(255,255,255,0.88);
  --text-secondary: rgba(255,255,255,0.45);
  --text-muted:     rgba(255,255,255,0.25);
  --btn-bg:         rgba(255,255,255,0.07);
  --btn-hover:      rgba(255,255,255,0.12);
  --btn-active:     rgba(255,255,255,0.05);
  --danger:         #FF453A;
  --success:        #32D74B;
  --radius:         12px;
  --radius-sm:      8px;
  --radius-xs:      6px;
  --font-ui:        "SF Pro Display","PingFang SC","Inter",system-ui,sans-serif;
  --font-mono:      "SF Mono","Fira Code","JetBrains Mono",monospace;
  --shadow-card:    0 2px 16px rgba(0,0,0,0.45), 0 0 0 0.5px rgba(255,255,255,0.06);
  --shadow-btn:     0 1px 4px rgba(0,0,0,0.4);
  --transition:     0.2s cubic-bezier(0.4,0,0.2,1);
  --safe-top:    env(safe-area-inset-top,    0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left:   env(safe-area-inset-left,   0px);
  --safe-right:  env(safe-area-inset-right,  0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  height: 100%;
  overscroll-behavior: none;
}

body {
  height: 100%;
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  -webkit-touch-callout: none;
}

button, .btn, .btn-export-single, textarea, input, a {
  -webkit-tap-highlight-color: transparent;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  min-width: 320px;
  padding-top: var(--safe-top);
  padding-left: var(--safe-left);
  padding-right: var(--safe-right);
}

#toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 16px;
  background: var(--bg-toolbar);
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
  overflow-x: auto;
  scrollbar-width: none;
  overscroll-behavior: none;
}
#toolbar::-webkit-scrollbar { display: none; }

.toolbar-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.04em;
  margin-right: 4px;
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}
.toolbar-title svg { opacity: 0.6; }

.toolbar-divider {
  width: 0.5px;
  height: 20px;
  background: var(--border);
  margin: 0 2px;
  flex-shrink: 0;
}

.toolbar-spacer { flex: 1; min-width: 6px; }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 6px 12px;
  min-height: 32px;
  background: var(--btn-bg);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background var(--transition), transform var(--transition),
              border-color var(--transition), box-shadow var(--transition);
  user-select: none;
  white-space: nowrap;
  box-shadow: var(--shadow-btn);
  outline: none;
  flex-shrink: 0;
  touch-action: manipulation;
}

.btn:hover   { background: var(--btn-hover); border-color: var(--border-focus); transform: scale(0.98); }
.btn:active  { background: var(--btn-active); transform: scale(0.96) !important; transition: transform 0.06s !important; }

.btn.accent  { background: var(--accent); border-color: transparent; color: #fff; }
.btn.accent:hover  { background: var(--accent-hover); box-shadow: 0 0 0 3px var(--accent-dim); }
.btn.accent:active { background: #0070E0; }

.btn svg { flex-shrink: 0; opacity: 0.75; }
.btn:hover svg { opacity: 1; }

.btn-icon { padding: 6px 8px; min-width: 32px; }

#btn-convert-mobile { display: none; }

.shortcut-badge {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  padding: 1px 5px;
  background: rgba(255,255,255,0.06);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 4px;
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  flex-shrink: 0;
}

#main {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

#editor-pane {
  display: flex;
  flex-direction: column;
  width: 50%;
  min-width: 360px;
  border-right: 0.5px solid var(--border);
  background: var(--bg-base);
  flex-shrink: 0;
  min-height: 0;
}

.pane-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 14px;
  background: var(--bg-toolbar);
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}

.pane-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-secondary);
}

.pane-actions { display: flex; align-items: center; gap: 6px; }

#editor-textarea {
  flex: 1;
  width: 100%;
  background: var(--bg-card);
  color: var(--text-primary);
  border: none;
  resize: none;
  font-family: var(--font-mono);
  font-size: 13.5px;
  line-height: 1.75;
  padding: 20px 22px;
  outline: none;
  tab-size: 2;
  caret-color: var(--accent);
  letter-spacing: 0.01em;
  box-shadow: inset 0 0 0 0.5px var(--border);
  min-height: 0;
  -webkit-overflow-scrolling: touch;
  overflow-y: auto;
  overscroll-behavior: contain;
}

#editor-textarea::selection { background: rgba(10,132,255,0.3); }
#editor-textarea::placeholder {
  color: var(--text-muted);
  font-family: var(--font-ui);
  font-size: 13px;
  line-height: 1.6;
}

.editor-hint {
  font-size: 11px;
  color: var(--text-muted);
  padding: 6px 14px;
  background: var(--bg-toolbar);
  border-top: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.editor-hint::-webkit-scrollbar { display: none; }
.hint-item { display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }

kbd {
  display: inline-flex; align-items: center;
  padding: 1px 5px;
  background: rgba(255,255,255,0.07);
  border: 0.5px solid rgba(255,255,255,0.12);
  border-radius: 4px;
  font-size: 10.5px;
  font-family: var(--font-mono);
  color: var(--text-secondary);
}

#resizer {
  width: 4px;
  background: transparent;
  cursor: col-resize;
  flex-shrink: 0;
  position: relative;
  z-index: 5;
  transition: background 0.2s;
}
#resizer:hover    { background: rgba(10,132,255,0.4); }
#resizer.dragging { background: var(--accent); }

#preview-pane {
  display: flex;
  flex-direction: column;
  flex: 1;
  background: var(--bg-base);
  overflow: hidden;
  min-height: 0;
}

#preview-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

#preview-scroll::-webkit-scrollbar        { width: 6px; }
#preview-scroll::-webkit-scrollbar-track  { background: transparent; }
#preview-scroll::-webkit-scrollbar-thumb  { background: rgba(255,255,255,0.1); border-radius: 3px; }
#preview-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

#preview-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 14px;
  opacity: 0.4;
  pointer-events: none;
  padding: 40px;
  text-align: center;
}
#preview-empty p {
  font-size: 13px;
  color: var(--text-secondary);
  max-width: 220px;
  line-height: 1.6;
}

/* 单个文档容器 - 所有内容都在这个卡片里 */
.document-container {
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  padding: 28px 32px;
  transition: border-color var(--transition), box-shadow var(--transition);
}

.document-container:hover {
  border-color: rgba(255,255,255,0.14);
  box-shadow: 0 4px 24px rgba(0,0,0,0.55), 0 0 0 0.5px rgba(255,255,255,0.1);
}

/* 文本样式 */
.document-text {
  margin: 0.75em 0;
  line-height: 1.7;
  white-space: pre-wrap;
  color: var(--text-primary);
  font-size: 14px;
}

.document-text h1 {
  font-size: 1.8em;
  margin: 0.67em 0;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.3em;
}

.document-text h2 {
  font-size: 1.5em;
  margin: 0.75em 0;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.3em;
}

.document-text h3 {
  font-size: 1.25em;
  margin: 0.83em 0;
}

.document-text code {
  background: rgba(255,255,255,0.07);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 0.9em;
}

.document-text strong {
  font-weight: 600;
  color: var(--text-primary);
}

.document-text em {
  font-style: italic;
}

.document-text br {
  display: block;
  margin: 0.25em 0;
}

/* 公式样式 */
.document-formula {
  margin: 1.2em 0;
  text-align: center;
  overflow-x: auto;
  padding: 0.25em 0;
}

.document-formula .katex-display {
  margin: 0;
}

.katex {
  color: rgba(255,255,255,0.9) !important;
}

/* 错误样式 */
.formula-error {
  color: var(--danger);
  font-size: 12px;
  font-family: var(--font-mono);
  padding: 8px 12px;
  background: rgba(255,69,58,0.1);
  border-radius: var(--radius-xs);
  border-left: 2px solid var(--danger);
  display: inline-block;
  text-align: left;
}

#statusbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 16px;
  padding-bottom: calc(6px + var(--safe-bottom));
  background: var(--bg-statusbar);
  border-top: 0.5px solid var(--border);
  flex-shrink: 0;
  font-size: 11.5px;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  overflow: hidden;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--success);
  flex-shrink: 0;
  transition: background 0.3s;
}
.status-dot.error   { background: var(--danger); }
.status-dot.working { background: #FF9F0A; animation: pulse 1s ease-in-out infinite; }

@keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.35 } }

#status-text {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#status-element-count { color: var(--text-muted); flex-shrink: 0; }

#toast {
  position: fixed;
  bottom: calc(52px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  padding: 9px 18px;
  background: rgba(44,44,46,0.96);
  border: 0.5px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  font-size: 13px;
  color: var(--text-primary);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 1000;
  white-space: nowrap;
  max-width: calc(100vw - 40px);
  text-align: center;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

#editor-textarea::-webkit-scrollbar        { width: 6px; }
#editor-textarea::-webkit-scrollbar-track  { background: transparent; }
#editor-textarea::-webkit-scrollbar-thumb  { background: rgba(255,255,255,0.1); border-radius: 3px; }

@media (max-width: 767px) {
  #app { min-width: 320px; }
  #main { flex-direction: column; }
  #editor-pane {
    width: 100% !important;
    min-width: unset;
    height: 40dvh;
    height: 40vh;
    border-right: none;
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
  }
  #preview-pane {
    height: 60dvh;
    height: 60vh;
    flex: none;
  }
  #resizer { display: none; }
  #btn-convert-mobile { display: inline-flex; }
  .shortcut-badge     { display: none; }
  .btn {
    padding: 10px 14px;
    min-height: 44px;
    font-size: 14px;
  }
  .btn-icon {
    padding: 10px;
    min-width: 44px;
  }
  #editor-textarea {
    font-size: 16px;
    padding: 14px 16px;
  }
  #editor-textarea::placeholder { font-size: 14px; }
  #preview-scroll { padding: 12px; }
  .document-container { padding: 16px 20px; }
  #preview-scroll, #editor-textarea {
    overscroll-behavior-y: contain;
  }
  #statusbar { font-size: 12px; }
  #toolbar { gap: 5px; padding: 8px 12px; }
}

@media (orientation: landscape) and (max-width: 896px) and (max-height: 500px) {
  #editor-pane  { height: 50dvh; height: 50vh; }
  #preview-pane { height: 50dvh; height: 50vh; flex: none; }
  #statusbar { padding-top: 4px; padding-bottom: calc(4px + var(--safe-bottom)); }
  .editor-hint { display: none; }
}

@media (min-width: 768px) and (max-width: 1024px) {
  #app { min-width: 768px; }
  .btn { padding: 7px 12px; min-height: 38px; }
}
</style>
</head>

<body>
<div id="app">

  <div id="toolbar">
    <div class="toolbar-title">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
        <path d="M2 11.5L5.5 4L9 9.5L11 7L14 11.5H2Z" stroke="rgba(255,255,255,0.65)" stroke-width="1.2" stroke-linejoin="round" fill="none"/>
      </svg>
      LaTeX Editor
    </div>

    <div class="toolbar-divider"></div>

    <button class="btn" id="btn-new" title="新建 (Ctrl+N)">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <rect x="1.5" y="1.5" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.2"/>
        <path d="M6.5 4.5V8.5M4.5 6.5H8.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      新建
    </button>

    <button class="btn" id="btn-open" title="打开 (Ctrl+O)">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M1.5 4.5C1.5 3.4 2.4 2.5 3.5 2.5H5L6.5 4H10.5 C11.6 4 12.5 4.9 12.5 6V9.5C12.5 10.6 11.6 11.5 10.5 11.5 H3.5C2.4 11.5 1.5 10.6 1.5 9.5V4.5Z" stroke="currentColor" stroke-width="1.2" fill="none"/>
      </svg>
      打开
    </button>
    <input type="file" id="file-input" accept=".tex,.txt,.md" style="display:none" />

    <button class="btn" id="btn-save" title="保存 .tex (Ctrl+S)">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M2.5 2.5H9.5L11.5 4.5V10.5C11.5 11.1 11.1 11.5 10.5 11.5H2.5C1.9 11.5 1.5 11.1 1.5 10.5V3.5 C1.5 2.9 1.9 2.5 2.5 2.5Z" stroke="currentColor" stroke-width="1.2" fill="none"/>
        <path d="M4 2.5V5.5H9V2.5" stroke="currentColor" stroke-width="1.2"/>
        <rect x="3.5" y="7" width="6" height="4" rx="0.5" stroke="currentColor" stroke-width="1.2" fill="none"/>
      </svg>
      保存
    </button>

    <div class="toolbar-divider"></div>

    <button class="btn accent" id="btn-export-preview" title="导出整个预览区域">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M6.5 1.5V8.5M4 6L6.5 8.5L9 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M1.5 9.5V10.5C1.5 11.1 1.9 11.5 2.5 11.5H10.5C11.1 11.5 11.5 11.1 11.5 10.5V9.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      导出预览
    </button>

    <div class="toolbar-spacer"></div>

    <div class="shortcut-badge">⌘K 智能转换</div>
  </div>

  <div id="main">

    <div id="editor-pane">
      <div class="pane-header">
        <span class="pane-label">编辑器</span>
        <div class="pane-actions">
          <button class="btn btn-icon" id="btn-smart-convert" title="智能转换选中文本 (Ctrl+K / Cmd+K)">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 7C2 4.2 4.2 2 7 2C9.8 2 12 4.2 12 7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <path d="M12 7C12 9.8 9.8 12 7 12C4.2 12 2 9.8 2 7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-dasharray="2 2"/>
              <path d="M9.5 5L12 7L9.5 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="btn" id="btn-convert-mobile" title="智能转换选中文本">
            <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
              <path d="M2 7C2 4.2 4.2 2 7 2C9.8 2 12 4.2 12 7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <path d="M12 7C12 9.8 9.8 12 7 12C4.2 12 2 9.8 2 7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-dasharray="2 2"/>
              <path d="M9.5 5L12 7L9.5 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            转换
          </button>
        </div>
      </div>

      <textarea id="editor-textarea" spellcheck="false" autocorrect="off" autocomplete="off" autocapitalize="off" inputmode="text" placeholder="在此输入文本和 LaTeX 公式...

示例：
# 标题
这是普通文本，可以包含 **Markdown** 格式。

行内公式暂不支持，请使用独立公式：
$$E = mc^2$$

$$ \frac{1+x}{x} = 1 + \frac{1}{x} $$

选中文本后点击「转换」或按 Ctrl+K 进行智能转换。"></textarea>

      <div class="editor-hint">
        <span class="hint-item"><kbd>⌘K</kbd> 智能转换</span>
        <span class="hint-item"><kbd>⌘S</kbd> 保存</span>
        <span class="hint-item"><kbd>⌘O</kbd> 打开</span>
        <span class="hint-item"><kbd>⌘N</kbd> 新建</span>
      </div>
    </div>

    <div id="resizer"></div>

    <div id="preview-pane">
      <div class="pane-header">
        <span class="pane-label">预览</span>
        <span id="status-element-count" style="font-size:11px;font-family:var(--font-mono);color:var(--text-muted);">0 个元素</span>
      </div>
      <div id="preview-scroll">
        <div id="preview-empty">
          <svg width="38" height="38" viewBox="0 0 38 38" fill="none" style="opacity:.5">
            <rect x="3.5" y="7.5" width="31" height="23" rx="3.5" stroke="rgba(255,255,255,0.3)" stroke-width="1.4"/>
            <path d="M9 19H17M21 19H29M15 14H23M15 24H23" stroke="rgba(255,255,255,0.3)" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <p>输入文本和公式后将在此实时渲染</p>
        </div>
      </div>
    </div>

  </div>

  <div id="statusbar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">就绪</span>
  </div>

</div>

<div id="toast"></div>

<script>
'use strict';

function waitForKatex(cb, tries) {
  tries = tries || 0;
  if (typeof katex !== 'undefined') { cb(); return; }
  if (tries > 50) { console.warn('KaTeX failed to load.'); cb(); return; }
  setTimeout(function () { waitForKatex(cb, tries + 1); }, 100);
}
waitForKatex(init);

function init() {
  var isIOS    = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  var DEBOUNCE_DELAY   = isMobile ? 500 : 300;
  var EXPORT_PX_RATIO  = isMobile ? 1.5 : 2;

  var textarea       = document.getElementById('editor-textarea');
  var previewScroll  = document.getElementById('preview-scroll');
  var previewEmpty   = document.getElementById('preview-empty');
  var statusDot      = document.getElementById('status-dot');
  var statusText     = document.getElementById('status-text');
  var elementCountEl = document.getElementById('status-element-count');
  var toast          = document.getElementById('toast');

  var toastTimer   = null;
  var currentDocumentContainer = null; // 当前文档容器

  function setStatus(msg, type) {
    type = type || 'ok';
    statusText.textContent = msg;
    statusDot.className    = 'status-dot' + (type !== 'ok' ? ' ' + type : '');
  }

  function showToast(msg, duration) {
    duration = duration || 2400;
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toast.classList.remove('show'); }, duration);
  }

  function haptic(pattern) {
    try { if (navigator.vibrate) navigator.vibrate(pattern || 10); } catch (_) {}
  }

  function debounce(fn, delay) {
    var t;
    return function () {
      var args = arguments;
      clearTimeout(t);
      t = setTimeout(function () { fn.apply(null, args); }, delay);
    };
  }

  // 简单的 Markdown 渲染
  function renderMarkdown(text) {
    var html = text.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
    
    // 标题
    html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
    
    // 粗体
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');
    
    // 斜体
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    html = html.replace(/_(.+?)_/g, '<em>$1</em>');
    
    // 代码
    html = html.replace(/`(.+?)`/g, '<code>$1</code>');
    
    // 换行
    html = html.replace(/\n/g, '<br>');
    
    return html;
  }

  // 提取并处理内容块（文本和公式）
  function parseContent(source) {
    var blocks = [];
    var re = /\$\$([\s\S]+?)\$\$/g;
    var lastIndex = 0;
    var match;
    
    while ((match = re.exec(source)) !== null) {
      // 添加前面的文本
      if (match.index > lastIndex) {
        var textBlock = source.substring(lastIndex, match.index);
        if (textBlock) {
          blocks.push({ type: 'text', content: textBlock });
        }
      }
      // 添加公式
      blocks.push({ type: 'formula', content: match[1].trim() });
      lastIndex = match.index + match[0].length;
    }
    
    // 添加剩余的文本
    if (lastIndex < source.length) {
      var remainingText = source.substring(lastIndex);
      if (remainingText) {
        blocks.push({ type: 'text', content: remainingText });
      }
    }
    
    return blocks;
  }

  // 刷新预览 - 连续文档模式（所有内容在一个卡片里）
  var refreshPreview = debounce(function () {
    var blocks = parseContent(textarea.value);
    
    // 清空旧内容
    Array.from(previewScroll.children).forEach(function (c) {
      if (c !== previewEmpty) c.remove();
    });

    if (blocks.length === 0) {
      previewEmpty.style.display = 'flex';
      elementCountEl.textContent = '0 个元素';
      setStatus('就绪');
      return;
    }

    previewEmpty.style.display = 'none';
    
    // 创建单个文档容器（一个大卡片）
    var docContainer = document.createElement('div');
    docContainer.className = 'document-container';
    
    var formulaCount = 0;
    var errCount = 0;
    var textBlockCount = 0;
    
    blocks.forEach(function (block) {
      if (block.type === 'text') {
        // 文本块 - 直接作为段落
        var textDiv = document.createElement('div');
        textDiv.className = 'document-text';
        textDiv.innerHTML = renderMarkdown(block.content);
        docContainer.appendChild(textDiv);
        textBlockCount++;
        
      } else if (block.type === 'formula') {
        // 公式块
        formulaCount++;
        var formulaWrapper = document.createElement('div');
        formulaWrapper.className = 'document-formula';
        
        try {
          if (typeof katex !== 'undefined') {
            katex.render(block.content, formulaWrapper, {
              throwOnError: false,
              errorColor: '#FF453A',
              displayMode: true,
              output: 'html',
            });
          } else {
            formulaWrapper.textContent = '[KaTeX 未加载] ' + block.content;
          }
        } catch (err) {
          errCount++;
          var errEl = document.createElement('div');
          errEl.className = 'formula-error';
          errEl.textContent = '渲染错误: ' + err.message;
          formulaWrapper.appendChild(errEl);
        }
        
        docContainer.appendChild(formulaWrapper);
      }
    });
    
    previewScroll.appendChild(docContainer);
    currentDocumentContainer = docContainer;
    
    elementCountEl.textContent = (textBlockCount + formulaCount) + ' 个元素';
    
    if (errCount > 0) {
      setStatus('渲染完成，' + errCount + ' 个公式有语法错误', 'error');
    } else {
      setStatus('渲染完成，共 ' + formulaCount + ' 个公式，' + textBlockCount + ' 段文本');
    }
  }, DEBOUNCE_DELAY);

  // 智能转换功能
  var GREEK_MAP = {
    alpha:'\\alpha', beta:'\\beta', gamma:'\\gamma', delta:'\\delta',
    epsilon:'\\epsilon', zeta:'\\zeta', eta:'\\eta', theta:'\\theta',
    iota:'\\iota', kappa:'\\kappa', lambda:'\\lambda', mu:'\\mu',
    nu:'\\nu', xi:'\\xi', omicron:'\\omicron', pi:'\\pi',
    rho:'\\rho', sigma:'\\sigma', tau:'\\tau', upsilon:'\\upsilon',
    phi:'\\phi', chi:'\\chi', psi:'\\psi', omega:'\\omega',
  };

  function step1_varNumber(t) {
    return t.replace(/([a-zA-Z])(\d+)/g, '$1^{$2}');
  }

  function step2_subscript(t) {
    return t.replace(/([a-zA-Z])_([a-zA-Z0-9]+)/g, '$1_{$2}');
  }

  function step3_greek(t) {
    var re = new RegExp('\\b(' + Object.keys(GREEK_MAP).join('|') + ')\\b', 'g');
    return t.replace(re, function (m) { return GREEK_MAP[m] || m; });
  }

  function step4_fraction(t) {
    t = t.replace(/([^\s]+)\s+\/\s+([^\s]+)/g, '\\frac{$1}{$2}');
    t = t.replace(/(?<!\\frac\{[^}]*)([^\s\\{}])\s*\/\s*([^\s\\{}])/g,
      function (_, a, b) { return '\\frac{' + a + '}{' + b + '}'; });
    return t;
  }

  function step5_wrap(t) { return '$$' + t + '$$'; }

  function smartConvert(text) {
    var t = text;
    t = step1_varNumber(t);
    t = step2_subscript(t);
    t = step3_greek(t);
    t = step4_fraction(t);
    t = step5_wrap(t);
    return t;
  }

  function applySmartConvert() {
    var start = textarea.selectionStart;
    var end   = textarea.selectionEnd;

    if (start === end) {
      showToast('请先选中要转换的文本');
      haptic([10, 30, 10]);
      return;
    }

    var selected  = textarea.value.substring(start, end);
    var converted = smartConvert(selected);
    var before    = textarea.value.substring(0, start);
    var after     = textarea.value.substring(end);

    textarea.value = before + converted + after;

    var newEnd = start + converted.length;
    textarea.setSelectionRange(newEnd, newEnd);
    textarea.focus();

    haptic(12);
    setStatus('智能转换 — "' + selected.trim().substring(0, 28) + '"');
    showToast('✨ 智能转换完成');
    refreshPreview();
  }

  // 导出整个预览区域为图片
  async function exportPreviewAsImage() {
    if (!currentDocumentContainer) {
      showToast('没有可导出的内容');
      return;
    }
    if (typeof htmlToImage === 'undefined') {
      showToast('⚠ html-to-image 未加载');
      return;
    }
    
    try {
      setStatus('正在导出预览区域...', 'working');
      showToast('📸 正在生成图片，请稍候...', 3000);
      
      // 创建临时容器用于导出（白色背景）
      var tempContainer = document.createElement('div');
      tempContainer.style.backgroundColor = '#ffffff';
      tempContainer.style.padding = '40px';
      tempContainer.style.borderRadius = '8px';
      tempContainer.style.display = 'inline-block';
      
      var clone = currentDocumentContainer.cloneNode(true);
      clone.style.backgroundColor = '#ffffff';
      clone.style.color = '#000000';
      clone.style.boxShadow = 'none';
      
      // 修改克隆元素中的文本颜色
      var textDivs = clone.querySelectorAll('.document-text');
      textDivs.forEach(function(div) {
        div.style.color = '#000000';
      });
      
      // 修改公式颜色
      var katexElements = clone.querySelectorAll('.katex');
      katexElements.forEach(function(katexEl) {
        katexEl.style.color = '#000000';
      });
      
      tempContainer.appendChild(clone);
      document.body.appendChild(tempContainer);
      
      var dataUrl = await htmlToImage.toPng(tempContainer, {
        backgroundColor: '#ffffff',
        pixelRatio: EXPORT_PX_RATIO * 1.5,
        quality: 1.0,
      });
      
      document.body.removeChild(tempContainer);
      
      var timestamp = formatTimestamp(new Date());
      downloadDataUrl(dataUrl, 'latex_document_' + timestamp + '.png');
      setStatus('预览导出成功');
      showToast('✅ 文档图片已下载');
    } catch (err) {
      setStatus('导出失败: ' + err.message, 'error');
      showToast('⚠ 导出失败');
      console.error('Export preview error:', err);
    }
  }

  // 导出为 PDF
  async function exportPreviewAsPDF() {
    if (!currentDocumentContainer) {
      showToast('没有可导出的内容');
      return;
    }
    if (typeof html2pdf === 'undefined') {
      showToast('⚠ html2pdf 库未加载');
      return;
    }
    
    try {
      setStatus('正在生成 PDF...', 'working');
      showToast('📄 正在生成 PDF，请稍候...', 3000);
      
      var tempContainer = document.createElement('div');
      tempContainer.style.backgroundColor = '#ffffff';
      tempContainer.style.padding = '40px';
      tempContainer.style.fontFamily = 'system-ui, -apple-system, sans-serif';
      tempContainer.style.width = '800px';
      tempContainer.style.margin = '0 auto';
      
      var clone = currentDocumentContainer.cloneNode(true);
      clone.style.backgroundColor = '#ffffff';
      clone.style.color = '#000000';
      clone.style.boxShadow = 'none';
      
      var textDivs = clone.querySelectorAll('.document-text');
      textDivs.forEach(function(div) {
        div.style.color = '#000000';
      });
      
      var katexElements = clone.querySelectorAll('.katex');
      katexElements.forEach(function(katexEl) {
        katexEl.style.color = '#000000';
      });
      
      tempContainer.appendChild(clone);
      document.body.appendChild(tempContainer);
      
      var opt = {
        margin: [0.5, 0.5, 0.5, 0.5],
        filename: 'latex_document_' + formatTimestamp(new Date()) + '.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, backgroundColor: '#ffffff' },
        jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
      };
      
      html2pdf().set(opt).from(tempContainer).save().then(function() {
        document.body.removeChild(tempContainer);
        setStatus('PDF 导出成功');
        showToast('✅ PDF 已下载');
      }).catch(function(err) {
        document.body.removeChild(tempContainer);
        throw err;
      });
      
    } catch (err) {
      setStatus('PDF 导出失败: ' + err.message, 'error');
      showToast('⚠ PDF 导出失败');
      console.error('Export PDF error:', err);
    }
  }

  // 选择导出格式
  function exportPreview() {
    if (!currentDocumentContainer || !currentDocumentContainer.children.length) {
      showToast('没有可导出的内容');
      return;
    }
    var choice = confirm('点击"确定"导出为 PNG 图片，点击"取消"导出为 PDF 文档');
    if (choice) {
      exportPreviewAsImage();
    } else {
      exportPreviewAsPDF();
    }
  }

  // 文件操作
  function newDocument() {
    textarea.value = '';
    refreshPreview();
    setStatus('已新建');
    showToast('📄 新建文档');
    if (!isMobile) textarea.focus();
  }

  function openFile() {
    document.getElementById('file-input').click();
  }

  function handleFileOpen(event) {
    var file = event.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function (e) {
      textarea.value = e.target.result;
      refreshPreview();
      setStatus('已打开: ' + file.name);
      showToast('📂 ' + file.name);
    };
    reader.onerror = function () {
      setStatus('文件读取失败', 'error');
      showToast('⚠ 文件读取失败');
    };
    reader.readAsText(file, 'utf-8');
    event.target.value = '';
  }

  function saveFile() {
    var blob = new Blob([textarea.value], { type: 'text/plain;charset=utf-8' });
    downloadBlob(blob, 'document.tex');
    setStatus('已保存为 document.tex');
    showToast('💾 document.tex 已下载');
  }

  function downloadDataUrl(dataUrl, filename) {
    var a = document.createElement('a');
    a.href = dataUrl; a.download = filename; a.click();
  }

  function downloadBlob(blob, filename) {
    var url = URL.createObjectURL(blob);
    var a   = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(function () { URL.revokeObjectURL(url); a.remove(); }, 1200);
  }

  function formatTimestamp(d) {
    var p = function (n) { return String(n).padStart(2, '0'); };
    return '' + d.getFullYear() + p(d.getMonth() + 1) + p(d.getDate()) +
           '_' + p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds());
  }

  // 事件绑定
  document.getElementById('btn-new').addEventListener('click', newDocument);
  document.getElementById('btn-open').addEventListener('click', openFile);
  document.getElementById('btn-save').addEventListener('click', saveFile);
  document.getElementById('btn-export-preview').addEventListener('click', exportPreview);
  document.getElementById('btn-smart-convert').addEventListener('click', applySmartConvert);
  document.getElementById('btn-convert-mobile').addEventListener('click', function () {
    haptic(8);
    applySmartConvert();
  });
  document.getElementById('file-input').addEventListener('change', handleFileOpen);
  textarea.addEventListener('input', refreshPreview);

  // 键盘快捷键
  document.addEventListener('keydown', function (e) {
    var mod = e.ctrlKey || e.metaKey;
    if (!mod) return;
    switch (e.key.toLowerCase()) {
      case 'k': e.preventDefault(); applySmartConvert(); break;
      case 'n': e.preventDefault(); newDocument();       break;
      case 'o': e.preventDefault(); openFile();          break;
      case 's': e.preventDefault(); saveFile();          break;
    }
  });

  // iOS 软键盘处理
  if (isIOS) {
    textarea.addEventListener('focus', function () {
      setTimeout(function () {
        textarea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 320);
    });

    if (window.visualViewport) {
      var rafPending = null;
      var appEl      = document.getElementById('app');

      window.visualViewport.addEventListener('resize', function () {
        cancelAnimationFrame(rafPending);
        rafPending = requestAnimationFrame(function () {
          var vv  = window.visualViewport;
          var kbH = window.innerHeight - vv.height - vv.offsetTop;
          if (kbH > 80) {
            appEl.style.height = vv.height + 'px';
          } else {
            appEl.style.height = '';
          }
        });
      });
    }
  }

  // 桌面端面板宽度调整
  (function initResizer() {
    var resizer    = document.getElementById('resizer');
    var editorPane = document.getElementById('editor-pane');
    var isDragging = false, startX = 0, startWidth = 0;

    resizer.addEventListener('mousedown', function (e) {
      isDragging = true;
      startX     = e.clientX;
      startWidth = editorPane.offsetWidth;
      resizer.classList.add('dragging');
      document.body.style.cursor     = 'col-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', function (e) {
      if (!isDragging) return;
      var delta    = e.clientX - startX;
      var newWidth = Math.max(300, Math.min(startWidth + delta, window.innerWidth - 300));
      editorPane.style.width = newWidth + 'px';
    });

    document.addEventListener('mouseup', function () {
      if (!isDragging) return;
      isDragging = false;
      resizer.classList.remove('dragging');
      document.body.style.cursor     = '';
      document.body.style.userSelect = '';
    });
  })();

  // 初始化示例内容
  var DEMO = [
    '# LaTeX 智能编辑器',
    '',
    '这是一个支持**文本**和**公式**混合编辑的文档。',
    '',
    '## 功能介绍',
    '',
    '1. **智能转换**：选中 `1+x / x` 后按 `⌘K` 会转换为 `$$\\frac{1+x}{x}$$`',
    '2. **实时预览**：右侧预览区域会实时显示渲染效果',
    '3. **导出功能**：可以将整个文档导出为 PNG 图片或 PDF 文档',
    '',
    '## 公式示例',
    '',
    '质能方程：',
    '$$E = mc^2$$',
    '',
    '二次方程求根公式：',
    '$$\\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}$$',
    '',
    '欧拉恒等式：',
    '$$e^{i\\pi} + 1 = 0$$',
    '',
    '## 文本格式化',
    '',
    '支持 **粗体**、*斜体* 和 `代码` 等 Markdown 格式。',
    '',
    '---',
    '',
    '试试选中下面的文本后按 `⌘K`：',
    '- `x2 + y2 / r2`',
    '- `alpha + beta / gamma`',
    '- `a_i + b_j`',
  ].join('\n');

  textarea.value = DEMO;
  refreshPreview();
  setStatus(isMobile
    ? '就绪 — 选中文本后点击「转换」按钮'
    : '就绪 — 选中文本后按 Ctrl+K 智能转换');
}
</script>
</body>
</html>
