<style>
/* ═══════════════════════════════════════════════════════════════
   CSS VARIABLES
═══════════════════════════════════════════════════════════════ */
:root {
  --bg-base:        #1E1E1E;
  --bg-card:        #2B2B2B;
  --bg-toolbar:     #242424;
  --bg-statusbar:   #1A1A1A;
  --border:         rgba(255,255,255,0.08);
  --border-focus:   rgba(255,255,255,0.22);
  --accent:         #0A84FF;
  --accent-hover:   #1A90FF;
  --accent-dim:     rgba(10,132,255,0.18);
  --text-primary:   rgba(255,255,255,0.88);
  --text-secondary: rgba(255,255,255,0.45);
  --text-muted:     rgba(255,255,255,0.25);
  --btn-bg:         rgba(255,255,255,0.07);
  --btn-hover:      rgba(255,255,255,0.12);
  --btn-active:     rgba(255,255,255,0.05);
  --danger:         #FF453A;
  --success:        #32D74B;
  --radius:         12px;
  --radius-sm:      8px;
  --radius-xs:      6px;
  --font-ui:        "SF Pro Display","PingFang SC","Inter",system-ui,sans-serif;
  --font-mono:      "SF Mono","Fira Code","JetBrains Mono",monospace;
  --shadow-card:    0 2px 16px rgba(0,0,0,0.45), 0 0 0 0.5px rgba(255,255,255,0.06);
  --shadow-btn:     0 1px 4px rgba(0,0,0,0.4);
  --transition:     0.2s cubic-bezier(0.4,0,0.2,1);
  /* iOS safe-area insets */
  --safe-top:    env(safe-area-inset-top,    0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left:   env(safe-area-inset-left,   0px);
  --safe-right:  env(safe-area-inset-right,  0px);
}

/* ═══════════════════════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  height: 100%;
  overscroll-behavior: none; /* prevent full-page pull-to-refresh */
}

body {
  height: 100%;
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  /* disable long-press callout on UI surfaces */
  -webkit-touch-callout: none;
}

/* Remove iOS blue tap flash globally */
button, .btn, .btn-export-single, textarea, input, a {
  -webkit-tap-highlight-color: transparent;
}

/* ═══════════════════════════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  /* dvh = dynamic viewport height, accounts for iOS keyboard */
  height: 100vh;
  height: 100dvh;
  min-width: 320px;
  /* push content away from notch / Dynamic Island */
  padding-top: var(--safe-top);
  padding-left: var(--safe-left);
  padding-right: var(--safe-right);
}

/* ═══════════════════════════════════════════════════════════════
   TOOLBAR
═══════════════════════════════════════════════════════════════ */
#toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 16px;
  background: var(--bg-toolbar);
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
  /* allow horizontal scroll on very narrow screens */
  overflow-x: auto;
  scrollbar-width: none;
  overscroll-behavior: none;
}
#toolbar::-webkit-scrollbar { display: none; }

.toolbar-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 0.04em;
  margin-right: 4px;
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}
.toolbar-title svg { opacity: 0.6; }

.toolbar-divider {
  width: 0.5px;
  height: 20px;
  background: var(--border);
  margin: 0 2px;
  flex-shrink: 0;
}

.toolbar-spacer { flex: 1; min-width: 6px; }

/* ═══════════════════════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 6px 12px;
  min-height: 32px;
  background: var(--btn-bg);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background var(--transition), transform var(--transition),
              border-color var(--transition), box-shadow var(--transition);
  user-select: none;
  white-space: nowrap;
  box-shadow: var(--shadow-btn);
  outline: none;
  flex-shrink: 0;
  touch-action: manipulation; /* removes 300ms delay on mobile */
}

.btn:hover   { background: var(--btn-hover); border-color: var(--border-focus); transform: scale(0.98); }
.btn:active  { background: var(--btn-active); transform: scale(0.96) !important; transition: transform 0.06s !important; }

.btn.accent  { background: var(--accent); border-color: transparent; color: #fff; }
.btn.accent:hover  { background: var(--accent-hover); box-shadow: 0 0 0 3px var(--accent-dim); }
.btn.accent:active { background: #0070E0; }

.btn svg { flex-shrink: 0; opacity: 0.75; }
.btn:hover svg { opacity: 1; }

.btn-icon { padding: 6px 8px; min-width: 32px; }

/* Mobile convert button — hidden on desktop, shown on mobile */
#btn-convert-mobile { display: none; }

/* Keyboard shortcut badge — hidden on mobile */
.shortcut-badge {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  padding: 1px 5px;
  background: rgba(255,255,255,0.06);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 4px;
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════════════════════════
   MAIN — two-pane container
═══════════════════════════════════════════════════════════════ */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0; /* crucial: allow flex children to shrink */
}

/* ═══════════════════════════════════════════════════════════════
   EDITOR PANE
═══════════════════════════════════════════════════════════════ */
#editor-pane {
  display: flex;
  flex-direction: column;
  width: 50%;
  min-width: 360px;
  border-right: 0.5px solid var(--border);
  background: var(--bg-base);
  flex-shrink: 0;
  min-height: 0;
}

.pane-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 14px;
  background: var(--bg-toolbar);
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}

.pane-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-secondary);
}

.pane-actions { display: flex; align-items: center; gap: 6px; }

#editor-textarea {
  flex: 1;
  width: 100%;
  background: var(--bg-card);
  color: var(--text-primary);
  border: none;
  resize: none;
  font-family: var(--font-mono);
  font-size: 13.5px;
  line-height: 1.75;
  padding: 20px 22px;
  outline: none;
  tab-size: 2;
  caret-color: var(--accent);
  letter-spacing: 0.01em;
  box-shadow: inset 0 0 0 0.5px var(--border);
  min-height: 0;
  -webkit-overflow-scrolling: touch;
  overflow-y: auto;
  /* keep bounce inside textarea, not the whole page */
  overscroll-behavior: contain;
}

#editor-textarea::selection { background: rgba(10,132,255,0.3); }
#editor-textarea::placeholder {
  color: var(--text-muted);
  font-family: var(--font-ui);
  font-size: 13px;
  line-height: 1.6;
}

/* Keyboard shortcut hint (desktop only) */
.editor-hint {
  font-size: 11px;
  color: var(--text-muted);
  padding: 6px 14px;
  background: var(--bg-toolbar);
  border-top: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.editor-hint::-webkit-scrollbar { display: none; }
.hint-item { display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }

kbd {
  display: inline-flex; align-items: center;
  padding: 1px 5px;
  background: rgba(255,255,255,0.07);
  border: 0.5px solid rgba(255,255,255,0.12);
  border-radius: 4px;
  font-size: 10.5px;
  font-family: var(--font-mono);
  color: var(--text-secondary);
}

/* ═══════════════════════════════════════════════════════════════
   RESIZER (desktop drag handle)
═══════════════════════════════════════════════════════════════ */
#resizer {
  width: 4px;
  background: transparent;
  cursor: col-resize;
  flex-shrink: 0;
  position: relative;
  z-index: 5;
  transition: background 0.2s;
}
#resizer:hover    { background: rgba(10,132,255,0.4); }
#resizer.dragging { background: var(--accent); }

/* ═══════════════════════════════════════════════════════════════
   PREVIEW PANE
═══════════════════════════════════════════════════════════════ */
#preview-pane {
  display: flex;
  flex-direction: column;
  flex: 1;
  background: var(--bg-base);
  overflow: hidden;
  min-height: 0;
}

#preview-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  -webkit-overflow-scrolling: touch; /* iOS momentum scroll */
  overscroll-behavior: contain;      /* prevent page bounce */
}

#preview-scroll::-webkit-scrollbar        { width: 6px; }
#preview-scroll::-webkit-scrollbar-track  { background: transparent; }
#preview-scroll::-webkit-scrollbar-thumb  { background: rgba(255,255,255,0.1); border-radius: 3px; }
#preview-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

/* Empty state */
#preview-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 14px;
  opacity: 0.4;
  pointer-events: none;
  padding: 40px;
  text-align: center;
}
#preview-empty p {
  font-size: 13px;
  color: var(--text-secondary);
  max-width: 220px;
  line-height: 1.6;
}

/* ─── Formula Card ─── */
.formula-card {
  position: relative;
  background: var(--bg-card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  padding: 18px 20px;
  overflow: hidden;
  transition: border-color var(--transition), box-shadow var(--transition);
  animation: cardIn 0.22s ease both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.formula-card:hover {
  border-color: rgba(255,255,255,0.14);
  box-shadow: 0 4px 24px rgba(0,0,0,0.55), 0 0 0 0.5px rgba(255,255,255,0.1);
}

.formula-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.formula-index {
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

/* Per-card export button */
.btn-export-single {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  padding: 0;
  background: rgba(255,255,255,0.05);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-xs);
  color: var(--text-secondary);
  cursor: pointer;
  opacity: 0.3;
  transition: opacity var(--transition), background var(--transition),
              transform var(--transition), color var(--transition);
  outline: none;
  touch-action: manipulation;
}

.formula-card:hover .btn-export-single { opacity: 1; }

.btn-export-single:hover {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
  transform: scale(0.96);
}
.btn-export-single:active {
  transform: scale(0.90) !important;
  transition: transform 0.06s !important;
}

/* KaTeX render container */
.formula-render {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 2px;
}
.formula-render::-webkit-scrollbar { height: 3px; }
.formula-render::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* KaTeX dark mode overrides */
.formula-render .katex-display { margin: 0; }
.katex { color: rgba(255,255,255,0.9) !important; }

/* Inline error */
.formula-error {
  color: var(--danger);
  font-size: 12px;
  font-family: var(--font-mono);
  padding: 8px 12px;
  background: rgba(255,69,58,0.1);
  border-radius: var(--radius-xs);
  border-left: 2px solid var(--danger);
  word-break: break-all;
}

/* ═══════════════════════════════════════════════════════════════
   STATUS BAR
═══════════════════════════════════════════════════════════════ */
#statusbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 16px;
  /* push above iOS Home Indicator */
  padding-bottom: calc(6px + var(--safe-bottom));
  background: var(--bg-statusbar);
  border-top: 0.5px solid var(--border);
  flex-shrink: 0;
  font-size: 11.5px;
  color: var(--text-secondary);
  font-family: var(--font-mono);
  overflow: hidden;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--success);
  flex-shrink: 0;
  transition: background 0.3s;
}
.status-dot.error   { background: var(--danger); }
.status-dot.working { background: #FF9F0A; animation: pulse 1s ease-in-out infinite; }

@keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.35 } }

#status-text {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#status-formula-count { color: var(--text-muted); flex-shrink: 0; }

/* ═══════════════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════════════ */
#toast {
  position: fixed;
  bottom: calc(52px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  padding: 9px 18px;
  background: rgba(44,44,46,0.96);
  border: 0.5px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  font-size: 13px;
  color: var(--text-primary);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 1000;
  white-space: nowrap;
  max-width: calc(100vw - 40px);
  text-align: center;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ═══════════════════════════════════════════════════════════════
   DESKTOP SCROLLBARS (editor textarea)
═══════════════════════════════════════════════════════════════ */
#editor-textarea::-webkit-scrollbar        { width: 6px; }
#editor-textarea::-webkit-scrollbar-track  { background: transparent; }
#editor-textarea::-webkit-scrollbar-thumb  { background: rgba(255,255,255,0.1); border-radius: 3px; }

/* ═══════════════════════════════════════════════════════════════
   ██  RESPONSIVE — PHONE (<768px)  ██
═══════════════════════════════════════════════════════════════ */
@media (max-width: 767px) {

  #app { min-width: 320px; }

  /* Stack editor above preview */
  #main { flex-direction: column; }

  #editor-pane {
    width: 100% !important;
    min-width: unset;
    /* 40dvh respects keyboard on iOS 15.4+ */
    height: 40dvh;
    height: 40vh; /* fallback */
    border-right: none;
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
  }

  #preview-pane {
    height: 60dvh;
    height: 60vh;
    flex: none;
  }

  /* Hide desktop resizer */
  #resizer { display: none; }

  /* Show mobile labeled convert button, hide desktop hint */
  #btn-convert-mobile { display: inline-flex; }
  .shortcut-badge     { display: none; }

  /* 44px minimum touch targets (iOS HIG) */
  .btn {
    padding: 10px 14px;
    min-height: 44px;
    font-size: 14px;
  }
  .btn-icon {
    padding: 10px;
    min-width: 44px;
  }

  /* 16px+ font prevents iOS auto-zoom on focus */
  #editor-textarea {
    font-size: 16px;
    padding: 14px 16px;
  }
  #editor-textarea::placeholder { font-size: 14px; }

  /* Always-visible export button on mobile (no hover) */
  .btn-export-single {
    width: 44px;
    height: 44px;
    opacity: 0.7;
    border-radius: var(--radius-sm);
  }
  .formula-card:hover .btn-export-single { opacity: 0.7; }

  /* Breathing room in preview */
  #preview-scroll { padding: 12px; gap: 10px; }
  .formula-card   { padding: 14px 16px; }

  /* Prevent pull-to-refresh inside the editor & preview */
  #preview-scroll, #editor-textarea {
    overscroll-behavior-y: contain;
  }

  #statusbar { font-size: 12px; }

  /* Compact toolbar for small screens */
  #toolbar { gap: 5px; padding: 8px 12px; }
}

/* ═══════════════════════════════════════════════════════════════
   LANDSCAPE ON PHONES
═══════════════════════════════════════════════════════════════ */
@media (orientation: landscape) and (max-width: 896px) and (max-height: 500px) {
  #editor-pane  { height: 50dvh; height: 50vh; }
  #preview-pane { height: 50dvh; height: 50vh; flex: none; }
  #statusbar { padding-top: 4px; padding-bottom: calc(4px + var(--safe-bottom)); }
  /* In landscape, show editor-hint only if space allows */
  .editor-hint { display: none; }
}

/* ═══════════════════════════════════════════════════════════════
   TABLETS (768px – 1024px): keep side-by-side
═══════════════════════════════════════════════════════════════ */
@media (min-width: 768px) and (max-width: 1024px) {
  #app { min-width: 768px; }
  .btn { padding: 7px 12px; min-height: 38px; }
}
</style>

</head>

<script>
'use strict';

/* ─── Wait for KaTeX (loaded with defer attribute) ─────────────── */
function waitForKatex(cb, tries) {
  tries = tries || 0;
  if (typeof katex !== 'undefined') { cb(); return; }
  if (tries > 50) { console.warn('KaTeX failed to load.'); cb(); return; }
  setTimeout(function () { waitForKatex(cb, tries + 1); }, 100);
}
waitForKatex(init);

/* ═══════════════════════════════════════════════════════════════
   INIT — everything lives in this closure
═══════════════════════════════════════════════════════════════ */
function init() {

  /* ─── Device detection ──────────────────────────────────────── */
  var isIOS    = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  /* Mobile: longer debounce to reduce battery drain */
  var DEBOUNCE_DELAY   = isMobile ? 500 : 300;
  /* Mobile: slightly lower pixel ratio for faster export */
  var EXPORT_PX_RATIO  = isMobile ? 1.5 : 2;

  /* ─── DOM refs ──────────────────────────────────────────────── */
  var textarea       = document.getElementById('editor-textarea');
  var previewScroll  = document.getElementById('preview-scroll');
  var previewEmpty   = document.getElementById('preview-empty');
  var statusDot      = document.getElementById('status-dot');
  var statusText     = document.getElementById('status-text');
  var formulaCountEl = document.getElementById('status-formula-count');
  var toast          = document.getElementById('toast');

  /* ─── App state ─────────────────────────────────────────────── */
  var toastTimer   = null;
  var formulaCards = [];   /* rendered .formula-card DOM elements */

  /* ═══════════════════════════════════════════════════════════════
     STATUS & TOAST
  ═══════════════════════════════════════════════════════════════ */

  /**
   * Update status bar message.
   * @param {string} msg
   * @param {string} type  'ok' | 'error' | 'working'
   */
  function setStatus(msg, type) {
    type = type || 'ok';
    statusText.textContent = msg;
    statusDot.className    = 'status-dot' + (type !== 'ok' ? ' ' + type : '');
  }

  /**
   * Show a floating toast notification.
   * @param {string} msg
   * @param {number} duration  ms (default 2400)
   */
  function showToast(msg, duration) {
    duration = duration || 2400;
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toast.classList.remove('show'); }, duration);
  }

  /**
   * Haptic feedback via Vibration API (Android / some iOS).
   * @param {number|Array} pattern  ms
   */
  function haptic(pattern) {
    try { if (navigator.vibrate) navigator.vibrate(pattern || 10); } catch (_) {}
  }

  /* ═══════════════════════════════════════════════════════════════
     DEBOUNCE
  ═══════════════════════════════════════════════════════════════ */
  function debounce(fn, delay) {
    var t;
    return function () {
      var args = arguments;
      clearTimeout(t);
      t = setTimeout(function () { fn.apply(null, args); }, delay);
    };
  }

  /* ═══════════════════════════════════════════════════════════════
     PREVIEW / RENDER
  ═══════════════════════════════════════════════════════════════ */

  /**
   * Extract all $$...$$ blocks from source string.
   * @param {string} source
   * @returns {string[]}
   */
  function extractFormulas(source) {
    var out = [], re = /\$\$([\s\S]+?)\$\$/g, m;
    while ((m = re.exec(source)) !== null) out.push(m[1].trim());
    return out;
  }

  /**
   * Build a formula card DOM element.
   * @param {string} latex
   * @param {number} index  0-based
   * @returns {{ card: HTMLElement, hasError: boolean }}
   */
  function buildFormulaCard(latex, index) {
    var card = document.createElement('div');
    card.className    = 'formula-card';
    card.dataset.index = String(index);

    /* Header row */
    var header  = document.createElement('div');
    header.className = 'formula-card-header';

    var label = document.createElement('span');
    label.className   = 'formula-index';
    label.textContent = '公式 ' + (index + 1);

    /* Export button */
    var exportBtn = document.createElement('button');
    exportBtn.className          = 'btn-export-single';
    exportBtn.title              = '导出公式 ' + (index + 1) + ' (PNG)';
    exportBtn.setAttribute('aria-label', '导出公式 ' + (index + 1));
    exportBtn.innerHTML =
      '<svg width="13" height="13" viewBox="0 0 13 13" fill="none">' +
        '<path d="M6.5 1.5V8.5M4 6L6.5 8.5L9 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>' +
        '<path d="M1.5 9.5V10.5C1.5 11.1 1.9 11.5 2.5 11.5H10.5C11.1 11.5 11.5 11.1 11.5 10.5V9.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>' +
      '</svg>';

    (function (idx, cardEl) {
      exportBtn.addEventListener('click', function () {
        haptic(8);
        exportSingleFormula(cardEl, idx);
      });
    })(index, card);

    header.appendChild(label);
    header.appendChild(exportBtn);
    card.appendChild(header);

    /* Render area */
    var renderEl  = document.createElement('div');
    renderEl.className = 'formula-render';
    var hasError  = false;

    if (typeof katex !== 'undefined') {
      try {
        katex.render(latex, renderEl, {
          throwOnError: false,
          errorColor:   '#FF453A',
          displayMode:  true,
          output:       'html',
        });
      } catch (err) {
        hasError = true;
        var errEl = document.createElement('div');
        errEl.className   = 'formula-error';
        errEl.textContent = '渲染错误: ' + err.message;
        renderEl.appendChild(errEl);
      }
    } else {
      renderEl.textContent = '[KaTeX 未加载] ' + latex;
    }

    card.appendChild(renderEl);
    return { card: card, hasError: hasError };
  }

  /**
   * Full preview refresh (debounced).
   */
  var refreshPreview = debounce(function () {
    var formulas = extractFormulas(textarea.value);

    /* Remove old cards */
    formulaCards = [];
    Array.from(previewScroll.children).forEach(function (c) {
      if (c !== previewEmpty) c.remove();
    });

    if (formulas.length === 0) {
      previewEmpty.style.display = 'flex';
      formulaCountEl.textContent  = '0 个公式';
      setStatus('就绪');
      return;
    }

    previewEmpty.style.display = 'none';
    formulaCountEl.textContent  = formulas.length + ' 个公式';

    var errCount = 0;
    formulas.forEach(function (latex, i) {
      var result = buildFormulaCard(latex, i);
      if (result.hasError) errCount++;
      formulaCards.push(result.card);
      previewScroll.appendChild(result.card);
    });

    if (errCount > 0)
      setStatus('渲染完成，' + errCount + ' 个公式有语法错误', 'error');
    else
      setStatus('渲染完成，共 ' + formulas.length + ' 个公式');
  }, DEBOUNCE_DELAY);

  /* ═══════════════════════════════════════════════════════════════
     SMART CONVERSION
  ═══════════════════════════════════════════════════════════════ */

  var GREEK_MAP = {
    alpha:'\\alpha', beta:'\\beta', gamma:'\\gamma', delta:'\\delta',
    epsilon:'\\epsilon', zeta:'\\zeta', eta:'\\eta', theta:'\\theta',
    iota:'\\iota', kappa:'\\kappa', lambda:'\\lambda', mu:'\\mu',
    nu:'\\nu', xi:'\\xi', omicron:'\\omicron', pi:'\\pi',
    rho:'\\rho', sigma:'\\sigma', tau:'\\tau', upsilon:'\\upsilon',
    phi:'\\phi', chi:'\\chi', psi:'\\psi', omega:'\\omega',
  };

  /* Step 1: x10 → x^{10} */
  function step1_varNumber(t) {
    return t.replace(/([a-zA-Z])(\d+)/g, '$1^{$2}');
  }

  /* Step 2: a_i → a_{i} */
  function step2_subscript(t) {
    return t.replace(/([a-zA-Z])_([a-zA-Z0-9]+)/g, '$1_{$2}');
  }

  /* Step 3: standalone greek words → LaTeX macros */
  function step3_greek(t) {
    var re = new RegExp('\\b(' + Object.keys(GREEK_MAP).join('|') + ')\\b', 'g');
    return t.replace(re, function (m) { return GREEK_MAP[m] || m; });
  }

  /**
   * Step 4: fraction conversion.
   * "A / B" (spaces around /) → \frac{A}{B}
   * "A/B"   (no spaces, single tokens) → \frac{A}{B}
   */
  function step4_fraction(t) {
    /* Spaced variant: non-space-token SP / SP non-space-token */
    t = t.replace(/([^\s]+)\s+\/\s+([^\s]+)/g, '\\frac{$1}{$2}');
    /* Compact variant: single non-special char / single non-special char */
    t = t.replace(/(?<!\\frac\{[^}]*)([^\s\\{}])\s*\/\s*([^\s\\{}])/g,
      function (_, a, b) { return '\\frac{' + a + '}{' + b + '}'; });
    return t;
  }

  /* Step 5: wrap with $$ */
  function step5_wrap(t) { return '$$' + t + '$$'; }

  /** Full smart conversion pipeline */
  function smartConvert(text) {
    var t = text;
    t = step1_varNumber(t);
    t = step2_subscript(t);
    t = step3_greek(t);
    t = step4_fraction(t);
    t = step5_wrap(t);
    return t;
  }

  /** Apply smart convert to the current textarea selection */
  function applySmartConvert() {
    var start = textarea.selectionStart;
    var end   = textarea.selectionEnd;

    if (start === end) {
      showToast('请先选中要转换的文本');
      haptic([10, 30, 10]);
      return;
    }

    var selected  = textarea.value.substring(start, end);
    var converted = smartConvert(selected);
    var before    = textarea.value.substring(0, start);
    var after     = textarea.value.substring(end);

    textarea.value = before + converted + after;

    var newEnd = start + converted.length;
    textarea.setSelectionRange(newEnd, newEnd);
    textarea.focus();

    haptic(12);
    setStatus('智能转换 — "' + selected.trim().substring(0, 28) + '"');
    showToast('✨ 智能转换完成');
    refreshPreview();
  }

  /* ═══════════════════════════════════════════════════════════════
     IMAGE EXPORT
  ═══════════════════════════════════════════════════════════════ */

  /**
   * Export a single formula card as PNG.
   * @param {HTMLElement} cardEl
   * @param {number} index  0-based
   */
  async function exportSingleFormula(cardEl, index) {
    if (typeof htmlToImage === 'undefined') {
      showToast('⚠ html-to-image 未加载');
      return;
    }
    try {
      setStatus('正在导出公式 ' + (index + 1) + '…', 'working');
      var dataUrl = await htmlToImage.toPng(cardEl, {
        backgroundColor: null,
        pixelRatio: EXPORT_PX_RATIO,
        style: { padding: '20px' },
      });
      downloadDataUrl(dataUrl, 'formula_' + (index + 1) + '.png');
      setStatus('公式 ' + (index + 1) + ' 已导出');
      showToast('📷 formula_' + (index + 1) + '.png 已下载');
    } catch (err) {
      setStatus('导出失败: ' + err.message, 'error');
      showToast('⚠ 导出失败');
      console.error('Export single error:', err);
    }
  }

  /**
   * Export all formula cards as a ZIP archive.
   */
  async function exportAllFormulas() {
    if (formulaCards.length === 0) { showToast('没有可导出的公式'); return; }
    if (typeof htmlToImage === 'undefined' || typeof JSZip === 'undefined') {
      showToast('⚠ 依赖库未加载，请检查网络');
      return;
    }

    var total = formulaCards.length;

    /* Mobile: warn if batch is large */
    if (isMobile && total > 5) {
      showToast('⏳ 正在导出 ' + total + ' 个公式，请稍候…', 5000);
    }

    var zip = new JSZip(), successCount = 0;

    for (var i = 0; i < total; i++) {
      setStatus('正在导出第 ' + (i + 1) + '/' + total + ' 个公式…', 'working');
      try {
        var dataUrl = await htmlToImage.toPng(formulaCards[i], {
          backgroundColor: null,
          pixelRatio: EXPORT_PX_RATIO,
          style: { padding: '20px' },
        });
        var base64 = dataUrl.split(',')[1];
        var fname  = 'formula_' + String(i + 1).padStart(3, '0') + '.png';
        zip.file(fname, base64, { base64: true });
        successCount++;
      } catch (err) {
        console.warn('Formula ' + (i + 1) + ' export failed:', err);
        setStatus('公式 ' + (i + 1) + ' 导出失败，继续…', 'error');
      }
    }

    if (successCount === 0) {
      setStatus('导出失败，无法生成任何图片', 'error');
      return;
    }

    try {
      var ts      = formatTimestamp(new Date());
      var zipName = 'latex_formulas_' + ts + '.zip';
      var blob    = await zip.generateAsync({ type: 'blob' });

      if (typeof saveAs !== 'undefined') saveAs(blob, zipName);
      else downloadBlob(blob, zipName);

      haptic([10, 20, 30]);
      setStatus('导出完成！共 ' + successCount + ' 个公式');
      showToast('🎉 ZIP 已下载（' + successCount + ' 个公式）');
    } catch (err) {
      setStatus('ZIP 生成失败: ' + err.message, 'error');
      showToast('⚠ ZIP 生成失败');
    }
  }

  /* ═══════════════════════════════════════════════════════════════
     FILE OPERATIONS
  ═══════════════════════════════════════════════════════════════ */

  function newDocument() {
    textarea.value = '';
    refreshPreview();
    setStatus('已新建');
    showToast('📄 新建文档');
    if (!isMobile) textarea.focus();
  }

  function openFile() {
    document.getElementById('file-input').click();
  }

  function handleFileOpen(event) {
    var file = event.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function (e) {
      textarea.value = e.target.result;
      refreshPreview();
      setStatus('已打开: ' + file.name);
      showToast('📂 ' + file.name);
    };
    reader.onerror = function () {
      setStatus('文件读取失败', 'error');
      showToast('⚠ 文件读取失败');
    };
    reader.readAsText(file, 'utf-8');
    event.target.value = '';
  }

  function saveFile() {
    var blob = new Blob([textarea.value], { type: 'text/plain;charset=utf-8' });
    downloadBlob(blob, 'untitled.tex');
    setStatus('已保存为 untitled.tex');
    showToast('💾 untitled.tex 已下载');
  }

  /* ═══════════════════════════════════════════════════════════════
     UTILITIES
  ═══════════════════════════════════════════════════════════════ */

  function downloadDataUrl(dataUrl, filename) {
    var a = document.createElement('a');
    a.href = dataUrl; a.download = filename; a.click();
  }

  function downloadBlob(blob, filename) {
    var url = URL.createObjectURL(blob);
    var a   = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(function () { URL.revokeObjectURL(url); a.remove(); }, 1200);
  }

  function formatTimestamp(d) {
    var p = function (n) { return String(n).padStart(2, '0'); };
    return '' + d.getFullYear() + p(d.getMonth() + 1) + p(d.getDate()) +
           '_' + p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds());
  }

  /* ═══════════════════════════════════════════════════════════════
     EVENT LISTENERS — toolbar buttons
  ═══════════════════════════════════════════════════════════════ */
  document.getElementById('btn-new').addEventListener('click', newDocument);
  document.getElementById('btn-open').addEventListener('click', openFile);
  document.getElementById('btn-save').addEventListener('click', saveFile);
  document.getElementById('btn-export-all').addEventListener('click', exportAllFormulas);

  document.getElementById('btn-smart-convert').addEventListener('click', applySmartConvert);

  document.getElementById('btn-convert-mobile').addEventListener('click', function () {
    haptic(8);
    applySmartConvert();
  });

  document.getElementById('file-input').addEventListener('change', handleFileOpen);

  /* Editor input → debounced preview refresh */
  textarea.addEventListener('input', refreshPreview);

  /* ─── Keyboard shortcuts (desktop / external keyboard) ─── */
  document.addEventListener('keydown', function (e) {
    var mod = e.ctrlKey || e.metaKey;
    if (!mod) return;
    switch (e.key.toLowerCase()) {
      case 'k': e.preventDefault(); applySmartConvert(); break;
      case 'n': e.preventDefault(); newDocument();       break;
      case 'o': e.preventDefault(); openFile();          break;
      case 's': e.preventDefault(); saveFile();          break;
    }
  });

  /* ═══════════════════════════════════════════════════════════════
     iOS SOFT KEYBOARD HANDLING
  ═══════════════════════════════════════════════════════════════ */

  if (isIOS) {
    /*
     * When the iOS soft keyboard opens, scroll the textarea into
     * view so it's not hidden beneath the keyboard.
     */
    textarea.addEventListener('focus', function () {
      setTimeout(function () {
        textarea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 320); /* wait for keyboard animation (~300ms) */
    });

    /*
     * visualViewport API (iOS 13+): resize the app container
     * when the keyboard shows/hides to prevent layout overlap.
     */
    if (window.visualViewport) {
      var rafPending = null;
      var appEl      = document.getElementById('app');

      window.visualViewport.addEventListener('resize', function () {
        cancelAnimationFrame(rafPending);
        rafPending = requestAnimationFrame(function () {
          var vv  = window.visualViewport;
          var kbH = window.innerHeight - vv.height - vv.offsetTop;
          if (kbH > 80) {
            /* Keyboard is open: shrink app to visible area */
            appEl.style.height = vv.height + 'px';
          } else {
            /* Keyboard closed: restore full height */
            appEl.style.height = '';
          }
        });
      });
    }
  }

  /* ═══════════════════════════════════════════════════════════════
     PANE RESIZER (desktop mouse drag)
  ═══════════════════════════════════════════════════════════════ */
  (function initResizer() {
    var resizer    = document.getElementById('resizer');
    var editorPane = document.getElementById('editor-pane');
    var isDragging = false, startX = 0, startWidth = 0;

    resizer.addEventListener('mousedown', function (e) {
      isDragging = true;
      startX     = e.clientX;
      startWidth = editorPane.offsetWidth;
      resizer.classList.add('dragging');
      document.body.style.cursor     = 'col-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', function (e) {
      if (!isDragging) return;
      var delta    = e.clientX - startX;
      var newWidth = Math.max(300, Math.min(startWidth + delta, window.innerWidth - 300));
      editorPane.style.width = newWidth + 'px';
    });

    document.addEventListener('mouseup', function () {
      if (!isDragging) return;
      isDragging = false;
      resizer.classList.remove('dragging');
      document.body.style.cursor     = '';
      document.body.style.userSelect = '';
    });
  })();
